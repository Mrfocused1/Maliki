<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Account — Maliki Atelier</title>

<meta name="robots" content="noindex, nofollow" />

<style>
  :root {
    --black: #0a0908;
    --bg-warm: #0f0d0a;
    --bg-rich: #161210;
    --bg-loft: #1d1813;
    --bg-deep: #07060a;
    --charcoal: #141311;
    --soft: rgba(245, 236, 218, 0.98);
    --softer: rgba(245, 236, 218, 0.86);
    --softest: rgba(245, 236, 218, 0.62);
    --gold-1: #e8c488;
    --gold-2: #b68a4e;
    --gold-hi: #f8e3b4;
    --line: rgba(217, 176, 112, 0.36);
    --ok: #a3c08b;
    --danger: #d99a6c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg-warm); color: var(--soft);
    font-family: 'Lora', serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* Topbar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(20px, 3.6vh, 36px) clamp(20px, 5vw, 56px);
    border-bottom: 1px solid var(--line);
  }
  .wordmark img { height: clamp(64px, 6vw, 96px); width: auto; display: block; }
  .nav {
    display: flex; gap: clamp(20px, 3vw, 36px); align-items: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; color: #f5ecda;
  }
  .nav a:hover { color: var(--gold-hi); }
  .burger {
    display: none; flex-direction: column; justify-content: space-between;
    width: 24px; height: 18px; background: transparent; border: none;
    cursor: pointer; padding: 0;
  }
  .burger span { display: block; height: 1.5px; width: 100%; background: var(--soft); }
  .mobile-nav {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(10, 9, 8, 0.98);
    flex-direction: column; justify-content: center; align-items: center; gap: 36px;
    font-family: 'Playfair Display', serif;
    font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; color: #f5ecda;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a { transition: color 0.2s; }
  .mobile-nav a:hover { color: var(--gold-hi); }
  .mobile-nav-close {
    position: absolute; top: clamp(16px, 3vh, 28px); right: clamp(20px, 5vw, 56px);
    background: transparent; border: none; color: var(--softer);
    font-size: 20px; cursor: pointer; padding: 8px; line-height: 1;
  }
  .mobile-nav-close:hover { color: var(--gold-hi); }
  @media (max-width: 768px) { .nav { display: none; } .burger { display: flex; } }
  .nav a.active { color: var(--gold-1); }
  .nav .cart-btn {
    display: flex; align-items: center; gap: 8px;
  }
  .nav .count {
    background: var(--gold-2); color: var(--black);
    font-size: 10px; font-family: 'Playfair Display', serif;
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    letter-spacing: 0; font-weight: 600;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: clamp(40px, 7vh, 72px) 24px clamp(28px, 5vh, 48px);
  }
  .eyebrow {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.62em; text-indent: 0.62em;
    text-transform: uppercase; color: var(--softer);
    display: inline-block; padding-bottom: 14px;
  }
  .h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 44px); letter-spacing: 0.18em;
    text-transform: uppercase; color: #f5ecda;
  }
  .h1 em {
    font-style: normal; color: #d9b070;
  }

  /* Layout */
  .wrap {
    max-width: 520px; margin: 0 auto;
    padding: 0 24px clamp(60px, 10vh, 100px);
  }

  /* Tabs */
  .tabs {
    display: flex; border-bottom: 1px solid var(--line);
    margin-bottom: 36px;
  }
  .tab {
    background: none; border: none; color: var(--softest);
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 0 0 14px; margin-right: 28px; cursor: pointer;
    border-bottom: 1px solid transparent; margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab:hover { color: var(--softer); }
  .tab.active { color: var(--gold-1); border-bottom-color: var(--gold-1); }

  /* Form */
  .lbl {
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--softer); display: block; margin-bottom: 6px;
  }
  .field {
    border-bottom: 1px solid var(--line);
    display: block; transition: border-color 0.2s;
    margin-bottom: 22px;
  }
  .field:focus-within { border-color: rgba(217, 176, 112, 0.7); }
  .field input, .field select {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--soft); font-family: 'Lora', serif; font-size: 15px;
    padding: 10px 0; appearance: none;
  }
  .field input::placeholder { color: var(--softest); }
  .field select option { background: #141311; color: var(--soft); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  /* Buttons */
  .btn-primary {
    width: 100%; background: transparent;
    border: 1px solid rgba(217, 176, 112, 0.5);
    color: var(--gold-1);
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 16px 24px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { border-color: var(--gold-1); color: var(--gold-hi); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: none; border: none;
    color: var(--softest); font-family: 'Lora', serif; font-size: 13px;
    cursor: pointer; padding: 0; transition: color 0.2s;
  }
  .btn-ghost:hover { color: var(--softer); }

  /* Feedback */
  .feedback {
    font-size: 13px; margin-top: 14px; min-height: 18px; text-align: center;
  }
  .feedback.err { color: var(--danger); }
  .feedback.ok { color: var(--ok); }

  /* Forgot / helpers */
  .helper {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: var(--softest);
  }
  .helper a, .helper button {
    color: var(--softer); text-decoration: underline;
    text-underline-offset: 3px; background: none; border: none;
    font-family: 'Lora', serif; font-size: 12px; cursor: pointer;
  }
  .helper a:hover, .helper button:hover { color: var(--gold-1); }

  /* Profile — signed in */
  .account-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; gap: 12px; flex-wrap: wrap;
  }
  .account-header-left {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .account-email {
    font-size: 13px; color: var(--softer);
  }

  /* Loyalty badge */
  .loyalty-badge {
    position: relative; display: inline-block;
  }
  .loyalty-badge-btn {
    background: none; border: 1px solid rgba(217, 176, 112, 0.35);
    color: var(--gold-1); font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
    padding: 4px 10px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .loyalty-badge-btn:hover { border-color: var(--gold-1); color: var(--gold-hi); }
  .loyalty-popover {
    display: none; position: absolute; top: calc(100% + 10px); left: 0;
    min-width: 230px; background: var(--charcoal);
    border: 1px solid var(--line); padding: 18px 20px;
    z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .loyalty-popover.open { display: block; }
  .loyalty-popover-tier {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--gold-1); margin-bottom: 6px;
  }
  .loyalty-popover-desc {
    font-size: 12px; color: var(--softer); margin-bottom: 14px;
    font-style: italic; line-height: 1.5;
  }
  .loyalty-progress-label {
    font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--softest); margin-bottom: 7px;
  }
  .loyalty-bar-track {
    width: 100%; height: 2px; background: rgba(217,176,112,0.15);
  }
  .loyalty-bar-fill {
    height: 2px; background: var(--gold-2); transition: width 0.4s ease;
  }
  .loyalty-progress-values {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--softest); margin-top: 6px;
  }

  /* Section title */
  .section-lbl {
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.52em; text-transform: uppercase;
    color: var(--softest); margin-bottom: 24px;
    padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }

  /* Orders */
  .order-card {
    border: 1px solid var(--line); padding: 20px 22px;
    margin-bottom: 14px;
  }
  .order-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .order-num {
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold-1);
  }
  .order-date { font-size: 12px; color: var(--softest); }
  .order-items { font-size: 13px; color: var(--softer); margin-top: 6px; }
  .order-total {
    font-size: 13px; color: var(--soft); margin-top: 8px;
  }
  .order-status {
    display: inline-block; font-size: 10px; letter-spacing: 0.3em;
    text-transform: uppercase; padding: 3px 8px;
    border: 1px solid var(--line); color: var(--softer); margin-top: 10px;
  }
  .order-status.paid { color: var(--ok); border-color: rgba(163,192,139,0.3); }
  .order-status.fulfilled { color: var(--gold-1); border-color: rgba(217,176,112,0.3); }

  .empty {
    text-align: center; padding: 48px 0;
    color: var(--softest); font-size: 14px; font-style: italic;
  }
  .empty a { color: var(--gold-1); text-decoration: underline; text-underline-offset: 3px; }
  .empty a:hover { color: var(--gold-hi); }

  /* Loading */
  .loading {
    text-align: center; padding: 60px 0;
    color: var(--softest); font-size: 13px;
    font-family: 'Playfair Display', serif; letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* Footer */
  .footer {
    text-align: center; padding: 28px 24px;
    border-top: 1px solid var(--line);
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--softest); display: flex; justify-content: center; gap: 32px;
  }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--line); margin: 28px 0; }

  /* Wishlist grid */
  .wishlist-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    margin-top: 4px;
  }
  .wishlist-card {
    border: 1px solid var(--line); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .wishlist-card-img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover;
    background: var(--charcoal); display: block;
  }
  .wishlist-card-img-placeholder {
    width: 100%; aspect-ratio: 3/4; background: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    color: var(--softest); font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .wishlist-card-body {
    padding: 14px 14px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px;
  }
  .wishlist-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.1em; color: var(--soft);
    line-height: 1.4;
  }
  .wishlist-card-price {
    font-size: 12px; color: var(--softer);
  }
  .wishlist-card-actions {
    display: flex; gap: 8px; margin-top: auto; padding-top: 10px; flex-wrap: wrap;
  }
  .wishlist-card-link {
    flex: 1; background: transparent;
    border: 1px solid rgba(217,176,112,0.4); color: var(--gold-1);
    font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
    padding: 9px 8px; text-align: center;
    transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    display: inline-block;
  }
  .wishlist-card-link:hover { border-color: var(--gold-1); color: var(--gold-hi); }
  .wishlist-card-remove {
    background: none; border: 1px solid rgba(217,176,112,0.18);
    color: var(--softest); font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
    padding: 9px 10px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; white-space: nowrap;
  }
  .wishlist-card-remove:hover { border-color: rgba(217,176,112,0.4); color: var(--softer); }

  /* Referral section */
  .referral-heading {
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--softer); margin-bottom: 8px;
  }
  .referral-sub {
    font-size: 13px; color: var(--softest); line-height: 1.6; margin-bottom: 18px;
    font-style: italic;
  }
  .referral-link-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .referral-link-display {
    flex: 1; font-size: 12px; color: var(--softer);
    border-bottom: 1px solid var(--line); padding: 8px 0;
    word-break: break-all; min-width: 0;
    font-family: 'Lora', serif;
  }
  .btn-copy {
    background: transparent; border: 1px solid rgba(217,176,112,0.4);
    color: var(--gold-1); font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
    padding: 10px 16px; cursor: pointer; white-space: nowrap;
    transition: border-color 0.2s, color 0.2s; flex-shrink: 0;
  }
  .btn-copy:hover { border-color: var(--gold-1); color: var(--gold-hi); }
  .btn-copy.copied { color: var(--ok); border-color: rgba(163,192,139,0.4); }

  /* Communication preferences toggles */
  .prefs-heading {
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--softer); margin-bottom: 18px;
  }
  .pref-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--line); gap: 16px;
  }
  .pref-label {
    font-size: 13px; color: var(--softer); line-height: 1.4;
  }
  .toggle-wrap {
    position: relative; flex-shrink: 0;
  }
  .toggle-wrap input[type="checkbox"] {
    position: absolute; opacity: 0; width: 0; height: 0;
  }
  .toggle-track {
    display: block; width: 36px; height: 20px;
    background: rgba(217,176,112,0.12); border: 1px solid var(--line);
    border-radius: 10px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .toggle-track::after {
    content: ''; position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--softest);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-wrap input:checked + .toggle-track {
    background: rgba(217,176,112,0.2); border-color: rgba(217,176,112,0.5);
  }
  .toggle-wrap input:checked + .toggle-track::after {
    transform: translateX(16px); background: var(--gold-1);
  }
  .btn-prefs {
    width: 100%; background: transparent;
    border: 1px solid rgba(217,176,112,0.5);
    color: var(--gold-1); font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 16px 24px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; margin-top: 20px;
  }
  .btn-prefs:hover { border-color: var(--gold-1); color: var(--gold-hi); }
  .btn-prefs:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; gap: 0; }
    .nav { gap: 16px; font-size: 11px; }
    .wishlist-grid { grid-template-columns: 1fr; }
    .account-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

<script>
let SB_URL = 'https://yvjjtbejnicwckzmcadj.supabase.co';

fetch('/api/config').then(r => r.json()).then(d => {
  if (d.supabase_url) SB_URL = d.supabase_url;
  if (d.supabase_anon_key) SB_ANON = d.supabase_anon_key;
}).catch(() => {});

const KEYS = {
  token:   'maliki.auth_token',
  refresh: 'maliki.auth_refresh',
  expires: 'maliki.auth_expires',
  user:    'maliki.auth_user',
};

const COUNTRIES = ['United Kingdom','Ireland','France','Italy','Spain','Germany','Switzerland','Austria','Netherlands','Belgium','Sweden','Norway','Denmark','Greece','Portugal','United States','Canada','Australia','New Zealand','Singapore','Japan','South Korea','Hong Kong','UAE','Nigeria','South Africa'];

const root = document.getElementById('root');
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtPrice = c => { try { return new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',maximumFractionDigits:0}).format((c||0)/100); } catch { return `£${((c||0)/100).toFixed(0)}`; } };
const fmtDate = s => { try { return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); } catch { return s; } };

// ── Loyalty tier helpers ───────────────────────────────────────────────────
const DEFAULT_TIERS = [
  { name: 'Atelier',  min: 0,      max: 49900,   desc: 'Welcome to the atelier' },
  { name: 'Maison',   min: 50000,  max: 199900,  desc: 'Priority service & exclusive previews' },
  { name: 'Maître',   min: 200000, max: Infinity, desc: 'Dedicated concierge & complimentary resizing' },
];
const TIERS = (() => {
  try {
    const stored = Store.settings()?.loyalty_tiers;
    if (Array.isArray(stored) && stored.length) {
      return stored.map((t, i, arr) => ({
        ...t,
        min: Number(t.min) || 0,
        max: i === arr.length - 1 ? Infinity : Number(t.max) || Infinity,
      }));
    }
  } catch {}
  return DEFAULT_TIERS;
})();

function getTier(totalCents) {
  for (let i = TIERS.length - 1; i >= 0; i--) {
    if (totalCents >= TIERS[i].min) return { ...TIERS[i], index: i };
  }
  return { ...TIERS[0], index: 0 };
}

function loyaltyBadgeHTML(totalCents) {
  const tier = getTier(totalCents);
  const isTop = tier.index === TIERS.length - 1;
  let progressHTML = '';
  if (!isTop) {
    const next = TIERS[tier.index + 1];
    const range = next.min - tier.min;
    const progress = Math.min(totalCents - tier.min, range);
    const pct = Math.round((progress / range) * 100);
    const spent = fmtPrice(totalCents);
    const needed = fmtPrice(next.min);
    progressHTML = `
      <div class="loyalty-progress-label">Progress to ${esc(next.name)}</div>
      <div class="loyalty-bar-track"><div class="loyalty-bar-fill" style="width:${pct}%"></div></div>
      <div class="loyalty-progress-values"><span>${esc(spent)} spent</span><span>${esc(needed)}</span></div>`;
  } else {
    progressHTML = `<div class="loyalty-progress-label" style="color:var(--gold-1)">Highest tier achieved</div>`;
  }

  return `
    <div class="loyalty-badge" id="loyaltyBadge">
      <button class="loyalty-badge-btn" id="loyaltyBadgeBtn" aria-expanded="false" aria-controls="loyaltyPopover">
        ${esc(tier.name)}
      </button>
      <div class="loyalty-popover" id="loyaltyPopover" role="tooltip">
        <div class="loyalty-popover-tier">${esc(tier.name)}</div>
        <div class="loyalty-popover-desc">${esc(tier.desc)}</div>
        ${progressHTML}
      </div>
    </div>`;
}

// ── Session helpers ────────────────────────────────────────────────────────
function getSession() {
  return {
    token:   localStorage.getItem(KEYS.token),
    refresh: localStorage.getItem(KEYS.refresh),
    expires: parseInt(localStorage.getItem(KEYS.expires) || '0', 10),
  };
}
function saveSession(data) {
  const exp = Date.now() + (data.expires_in || 3600) * 1000;
  localStorage.setItem(KEYS.token,   data.access_token);
  localStorage.setItem(KEYS.refresh, data.refresh_token);
  localStorage.setItem(KEYS.expires, String(exp));
  if (data.user) localStorage.setItem(KEYS.user, JSON.stringify(data.user));
}
function clearSession() {
  Object.values(KEYS).forEach(k => localStorage.removeItem(k));
}

let _refreshPromise = null;
async function getValidToken() {
  const { token, refresh, expires } = getSession();
  if (!token) return null;
  if (expires > Date.now() + 60000) return token;
  if (!refresh) { clearSession(); return null; }
  if (_refreshPromise) return _refreshPromise;
  _refreshPromise = (async () => {
    try {
      const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh }),
      });
      if (!r.ok) { clearSession(); return null; }
      const data = await r.json();
      saveSession(data);
      return data.access_token;
    } catch { clearSession(); return null; }
    finally { _refreshPromise = null; }
  })();
  return _refreshPromise;
}

// ── Auth API calls (direct to Supabase Auth) ──────────────────────────────
async function apiLogin(email, password) {
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error_description || data.msg || 'Login failed. Check your email and password.');
  saveSession(data);
  return data;
}

async function apiSignup(name, email, password) {
  const r = await fetch(`${SB_URL}/auth/v1/signup`, {
    method: 'POST',
    headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password, data: { name } }),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error_description || data.msg || 'Signup failed. Please try again.');
  if (data.access_token) saveSession(data);
  return data;
}

async function apiLogout() {
  const { token } = getSession();
  clearSession();
  if (token) {
    try {
      await fetch(`${SB_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: { apikey: SB_ANON, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      });
    } catch {}
  }
}

async function apiForgotPassword(email) {
  const r = await fetch(`${SB_URL}/auth/v1/recover`, {
    method: 'POST',
    headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email }),
  });
  if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.error_description || 'Failed to send reset email.'); }
}

async function apiGetProfile(token) {
  const r = await fetch('/api/account/profile', { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error('Could not load profile.');
  return r.json();
}
async function apiSaveProfile(token, data) {
  const r = await fetch('/api/account/profile', {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error('Could not save profile.');
  return r.json();
}
async function apiGetOrders(token) {
  const r = await fetch('/api/account/orders', { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error('Could not load orders.');
  return r.json();
}
async function apiGetWishlist(token) {
  const r = await fetch('/api/account/wishlist', { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) return [];
  const d = await r.json();

}

async function apiGetReferral(token) {

}

  container.innerHTML = `
    <div class="wishlist-grid" id="wishlistGrid">
      ${products.map(p => `
        <div class="wishlist-card" data-slug="${esc(p.slug)}">
          ${p.image
            ? `<img class="wishlist-card-img" src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy" />`
            : `<div class="wishlist-card-img-placeholder">No image</div>`}
          <div class="wishlist-card-body">
            <div class="wishlist-card-title">${esc(p.title)}</div>
            ${p.price != null ? `<div class="wishlist-card-price">${esc(fmtPrice(p.price))}</div>` : ''}
            <div class="wishlist-card-actions">
              <a class="wishlist-card-link" href="/shop/${esc(p.slug)}">Add to Cart</a>
              <button class="wishlist-card-remove" data-slug="${esc(p.slug)}">Remove &times;</button>
            </div>
          </div>
        </div>`).join('')}
    </div>`;

  // Remove buttons
  container.querySelectorAll('.wishlist-card-remove').forEach(btn => {
    btn.addEventListener('click', async () => {
      const slug = btn.dataset.slug;
      btn.disabled = true; btn.textContent = 'Removing…';
      try {
        const t = await getValidToken();
        if (!t) throw new Error('Session expired.');
        await apiRemoveWishlist(t, slug);
        // Remove card from DOM
        const card = container.querySelector(`.wishlist-card[data-slug="${CSS.escape(slug)}"]`);
        if (card) card.remove();
        // If grid is now empty, show empty state
        const grid = document.getElementById('wishlistGrid');
        if (grid && grid.children.length === 0) {
          container.innerHTML = `<div class="empty">No saved pieces yet. <a href="/shop">Browse the collection &rarr;</a></div>`;
        }
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Remove ×';
      }
    });
  });
}

(async () => {
  // Update cart count
  try {
    const cart = Store.cart();
    const count = cart.reduce((s, i) => s + (i.quantity || 1), 0);
    const el = document.getElementById('cartCount');
    if (el) el.textContent = count;
  } catch {}

  const token = await getValidToken();
  if (token) {
    renderAccount();
  } else {
    // Check if arriving from checkout with ?register hint
    if (new URLSearchParams(location.search).has('register')) activeTab = 'register';
    renderAuth();
  }
})();

<script>
  (function(){
    var burger = document.getElementById('burgerBtn');
    var nav = document.getElementById('mobileNav');
    var closeBtn = document.getElementById('mobileNavClose');
    if (!burger || !nav) return;
    function openNav() { nav.classList.add('open'); burger.setAttribute('aria-expanded','true'); nav.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
    function closeNav() { nav.classList.remove('open'); burger.setAttribute('aria-expanded','false'); nav.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
    burger.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    nav.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeNav); });
    document.addEventListener('click', function(e) { if (nav.classList.contains('open') && !nav.contains(e.target) && !burger.contains(e.target)) closeNav(); });
  })();
</script>
