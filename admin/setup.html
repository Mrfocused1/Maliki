<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Create Admin Account — Maliki Atelier</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0a0908" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E' />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400&family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0908; --surface: #15130f; --line: rgba(217,176,112,0.24);
    --soft: rgba(245,236,218,0.98); --softer: rgba(245,236,218,0.86);
    --softest: rgba(245,236,218,0.55); --gold: #d9b070; --gold-hi: #f8e3b4;
    --danger: #e8a878; --ok: #b5d39c;
  }
  html, body {
    background: var(--bg); color: var(--soft);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
    min-height: 100%; -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(217,176,112,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 90%, rgba(0,0,0,0.4) 0%, transparent 70%),
      var(--bg);
  }
  .card {
    width: 100%; max-width: 400px; border: 1px solid var(--line);
    background: var(--surface); padding: 44px 40px; text-align: center;
  }
  .logo { margin: 0 auto 20px; }
  .logo img { height: 100px; width: auto; display: block; margin: 0 auto; }
  .eyebrow {
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--softest); margin-bottom: 6px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 26px; color: #f5ecda;
    font-weight: 300; margin-bottom: 8px;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: var(--softest); letter-spacing: 0.06em;
    margin-bottom: 32px;
  }
  .rule {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217,176,112,0.5), transparent);
    margin: 0 auto 28px;
  }
  .field {
    border: 1px solid var(--line); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  .field:focus-within { border-color: rgba(217,176,112,0.7); }
  .field input {
    background: transparent; border: none; outline: none;
    color: var(--soft); font-size: 14px; width: 100%;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .field input::placeholder { color: var(--softest); font-style: italic; }
  .strength-bar {
    height: 2px; border-radius: 1px; margin-bottom: 20px;
    transition: background 0.3s, width 0.3s;
    background: transparent; width: 0%;
  }
  .strength-bar.weak   { background: #e8a878; width: 33%; }
  .strength-bar.fair   { background: #f0d488; width: 66%; }
  .strength-bar.strong { background: var(--ok); width: 100%; }
  .btn {
    width: 100%; background: linear-gradient(180deg, #d9b070, #b68a4e);
    border: none; color: #1a120a;
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 14px; cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    margin-top: 14px; font-size: 12px; letter-spacing: 0.12em;
    min-height: 16px; line-height: 1.5;
  }
  .msg.err { color: var(--danger); }
  .msg.ok  { color: var(--ok); }
  .hint {
    margin-top: 18px; font-family: 'Cormorant Garamond', serif;
    font-size: 12px; color: var(--softest); letter-spacing: 0.08em;
    font-style: italic;
  }
  .state-invalid, .state-success { display: none; }
</style>
</head>
<body>

<div class="wrap">
  <div class="card" id="card">

    <!-- Setup form -->
    <div id="stateSetup">
      <div class="logo"><img src="/assets/maliki-logo.svg" alt="Maliki Atelier" /></div>
      <p class="eyebrow">Admin</p>
      <h1 id="setupTitle">Create your account</h1>
      <p class="subtitle" id="setupSubtitle">Choose a secure password to get started.</p>
      <div class="rule"></div>

      <form id="setupForm" novalidate>
        <div class="field">
          <input id="pw" type="password" autocomplete="new-password" placeholder="New password" autofocus minlength="8" required />
        </div>
        <div class="field">
          <input id="pw2" type="password" autocomplete="new-password" placeholder="Confirm password" required />
        </div>
        <div class="strength-bar" id="strengthBar"></div>
        <button type="submit" class="btn" id="submitBtn">Set Password</button>
        <div class="msg err" id="errMsg"></div>
      </form>

      <p class="hint">Your password must be at least 8 characters.</p>
    </div>

    <!-- Invalid / expired link -->
    <div id="stateInvalid" class="state-invalid">
      <div class="logo"><img src="/assets/maliki-logo.svg" alt="Maliki Atelier" /></div>
      <p class="eyebrow">Admin</p>
      <h1>Link expired</h1>
      <p class="subtitle">This invite link is invalid or has already been used. Please request a new invitation.</p>
    </div>

    <!-- Success -->
    <div id="stateSuccess" class="state-success">
      <div class="logo"><img src="/assets/maliki-logo.svg" alt="Maliki Atelier" /></div>
      <p class="eyebrow">Admin</p>
      <h1>Account created</h1>
      <p class="subtitle">Redirecting you to the admin panel…</p>
    </div>

  </div>
</div>

<script>
(function () {
  const SB_URL  = 'https://yvjjtbejnicwckzmcadj.supabase.co';
  const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amp0YmVqbmljd2Nrem1jYWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTYxNDAsImV4cCI6MjA5MzE3MjE0MH0.lADuHfTnozqMVXOdbc-MGEG6Em0C2eFcXAOfMbelnMc';

  // Parse hash params
  const hash = {};
  (window.location.hash.replace(/^#/, '') || '').split('&').forEach(kv => {
    const [k, v] = kv.split('=');
    if (k) hash[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });

  const accessToken = hash['access_token'];
  const tokenType   = hash['type'];

  if (!accessToken || (tokenType !== 'invite' && tokenType !== 'recovery')) {
    document.getElementById('stateSetup').style.display = 'none';
    document.getElementById('stateInvalid').style.display = 'block';
    return;
  }

  // Clear hash from URL without reload
  history.replaceState(null, '', window.location.pathname);

  if (tokenType === 'recovery') {
    document.getElementById('setupTitle').textContent = 'Reset your password';
    document.getElementById('setupSubtitle').textContent = 'Choose a new password for your account.';
  }

  // Password strength indicator
  const pw = document.getElementById('pw');
  const bar = document.getElementById('strengthBar');
  pw.addEventListener('input', () => {
    const v = pw.value;
    bar.className = 'strength-bar';
    if (!v) return;
    if (v.length < 8) bar.classList.add('weak');
    else if (v.length < 12 || !/[^a-zA-Z0-9]/.test(v)) bar.classList.add('fair');
    else bar.classList.add('strong');
  });

  document.getElementById('setupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password  = pw.value;
    const password2 = document.getElementById('pw2').value;
    const btn       = document.getElementById('submitBtn');
    const err       = document.getElementById('errMsg');

    err.textContent = '';

    if (password.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      return;
    }
    if (password !== password2) {
      err.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = '…';

    try {
      const r = await fetch(`${SB_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          apikey: SB_ANON,
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ password }),
      });

      if (!r.ok) {
        const d = await r.json();
        err.textContent = d.msg || d.message || 'Failed to set password.';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      document.getElementById('stateSetup').style.display   = 'none';
      document.getElementById('stateSuccess').style.display = 'block';

      setTimeout(() => { window.location.href = '/admin/'; }, 2000);
    } catch {
      err.textContent = 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
})();
</script>
</body>
</html>
