const renderContent = () => {
  const list = Store.pages();

  $('#topbar').innerHTML = `
    <h1>Content <small>${list.length} pages</small></h1>
    <div class="actions"><button class="btn" id="newPage">+ New page</button></div>
  `;
  $('#newPage').addEventListener('click', () => openPageDrawer(null));

  $('#content').innerHTML = `
    <div class="card">
      <div class="card-body flush">
        <table class="t">
          <thead><tr><th>Title</th><th>URL</th><th>Status</th><th>Updated</th></tr></thead>
          <tbody>
            ${list.length === 0
              ? '<tr class="no-hover"><td colspan="4"><div class="empty">No pages yet.<br><button class="btn sm" style="margin-top:14px" onclick="document.getElementById(\'newPage\').click()">+ New page</button></div></td></tr>'
              : list.map((p) => `
                <tr data-pgid="${escape(p.id)}">
                  <td><strong style="color:#f5ecda">${escape(p.title)}</strong></td>
                  <td><code style="color:var(--softer);font-size:12px">/pages/${escape(p.slug)}</code></td>
                  <td><span class="pill ${p.status === 'published' ? 'live' : 'draft'}">${escape(p.status)}</span></td>
                  <td style="color:var(--softer)">${escape(fmtRel(p.updated_at))}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  $$('tr[data-pgid]').forEach((tr) => tr.addEventListener('click', () => openPageDrawer(tr.dataset.pgid)));
};

const openPageDrawer = (id) => {
  const p = id ? Store.pageById(id) : null;
  state.editing = p ? p.id : 'new-page';

  $('#drawerTitle').textContent = p ? `Page · ${p.title}` : 'New page';
  $('#drawerFoot').innerHTML = `
    <div class="feedback" id="pgFb"></div>
    ${p ? '<button class="btn danger" id="pgDelete">Delete</button>' : ''}
    <button class="btn ghost" id="pgCancel">Cancel</button>
    <button class="btn" id="pgSave">${p ? 'Save' : 'Create'}</button>
  `;
  $('#drawerBody').innerHTML = `
    <div class="form-row">
      <label for="pg-title">Title</label>
      <input class="input" id="pg-title" value="${escape(p?.title || '')}" autofocus maxlength="200" />
    </div>
    <div class="form-row">
      <label for="pg-slug">URL slug</label>
      <input class="input" id="pg-slug" value="${escape(p?.slug || '')}" maxlength="80" />
      <div class="hint">/pages/<span id="pgSlugPreview">${escape(p?.slug || '…')}</span></div>
    </div>
    <div class="form-row">
      <label for="pg-body">Body</label>
      <textarea class="textarea" id="pg-body" rows="14" style="font-family:Georgia,serif">${escape(p?.body || '')}</textarea>
    </div>
    <div class="form-row">
      <label for="pg-status">Status</label>
      <select class="select" id="pg-status">
        <option value="published" ${(p?.status || 'published') === 'published' ? 'selected' : ''}>Published</option>
        <option value="draft" ${p?.status === 'draft' ? 'selected' : ''}>Draft</option>
      </select>
    </div>
  `;

  let slugTouched = !!p?.slug;
  $('#pg-title').addEventListener('input', (e) => {
    if (!slugTouched) {
      const s = slugify(e.target.value);
      $('#pg-slug').value = s; $('#pgSlugPreview').textContent = s || '…';
    }
  });
  $('#pg-slug').addEventListener('input', () => {
    slugTouched = true;
    $('#pgSlugPreview').textContent = slugify($('#pg-slug').value) || '…';
  });

  $('#pgCancel').addEventListener('click', closeDrawer);
  $('#pgSave').addEventListener('click', async () => {
    const fb = $('#pgFb');
    const btn = $('#pgSave');
    const data = {
      title: $('#pg-title').value.trim(),
      slug: slugify($('#pg-slug').value),
      body: $('#pg-body').value,
      status: $('#pg-status').value,
    };
    if (!data.title) { fb.textContent = 'Title is required.'; fb.className = 'feedback error'; return; }
    if (!data.slug) { fb.textContent = 'Slug is required.'; fb.className = 'feedback error'; return; }
    btn.disabled = true; btn.dataset.label = btn.textContent; btn.textContent = 'Saving…';
    try {
      if (p) Store.updatePage(p.id, data); else Store.addPage(data);
      toast(p ? 'Page saved' : 'Page created');
      closeDrawer();
    } catch (e) {
      fb.textContent = 'Save failed.'; fb.className = 'feedback error';
    } finally {
      btn.disabled = false; btn.textContent = btn.dataset.label || 'Save';
    }
  });
  if (p) $('#pgDelete').addEventListener('click', () => {
    if (confirm(`Delete "${p.title}"?`)) { Store.deletePage(p.id); toast('Deleted'); closeDrawer(); }
  });

  openDrawer();
};

const renderSettings = () => {
  $('#topbar').innerHTML = `<h1>Settings</h1>`;

  const tabs = [
    ['general', 'General'],
    ['branding', 'Branding'],
    ['integrations', 'Integrations'],
    ['notifications', 'Notifications'],
    ['shipping', 'Shipping'],
    ['legal', 'Legal'],
  ];

  $('#content').innerHTML = `
    <div class="settings-layout">
      <nav class="settings-nav">
        ${tabs.map(([k, lbl]) => `<button class="${state.settingsTab === k ? 'active' : ''}" data-st="${k}">${escape(lbl)}</button>`).join('')}
      </nav>
      <div class="settings-section" id="settingsBody"></div>
    </div>
  `;
  $$('.settings-nav button').forEach((b) =>
    b.addEventListener('click', () => { state.settingsTab = b.dataset.st; render(); })

  const pendingSaveBars = [];

    const id = `save_${sectionKey}`;
    pendingSaveBars.push({ id, sectionKey, gather });
    return `<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn" id="${id}">Save changes</button></div>`;
  };

    pendingSaveBars.splice(0).forEach(({ id, sectionKey, gather }) => {
      const btn = document.getElementById(id);
      if (btn) btn.addEventListener('click', () => {

      });

        <div class="card-body">

            </div>
            <label class="switch" style="flex-shrink:0">
              <input type="checkbox" id="siteModeToggle" ${siteMode === 'live' ? 'checked' : ''} />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="card"><div class="card-head"><h2>Store</h2></div>
        <div class="card-body">
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Store name</label><input class="input" id="sg-name" value="${escape(g.store_name || '')}"/></div>
            <div class="form-row" style="margin:0"><label>Contact email</label><input class="input" id="sg-email" value="${escape(g.store_email || '')}"/></div>
          </div>
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Default currency</label><input class="input" id="sg-currency" value="${escape(g.currency || 'GBP')}" maxlength="3"/></div>
            <div class="form-row" style="margin:0"><label>Timezone</label><input class="input" id="sg-tz" value="${escape(g.timezone || '')}"/></div>
          </div>
          <div class="form-row"><label>Atelier address</label><textarea class="textarea" id="sg-addr" rows="3">${escape(g.address || '')}</textarea></div>
          ${saveBar('general', () => ({
            store_name: $('#sg-name').value.trim(),

    if (t) t.addEventListener('change', () => {

  } else if (state.settingsTab === 'branding') {

          </div>

            <div class="lbl">Preview</div>
            <div style="background:var(--bg);border:1px solid var(--line);padding:32px;text-align:center;border-radius:6px">
              <div style="font-family:'Pinyon Script',serif;font-size:64px;color:${escape(b.accent_color || '#d9b070')};line-height:1">${escape(b.logo_text || 'Maliki')}</div>
              <div style="font-family:'Playfair Display',serif;font-size:11px;letter-spacing:0.42em;color:var(--softer);margin-top:6px">Atelier</div>

          ${saveBar('branding', () => ({

      <div class="card"><div class="card-head"><h2>Integrations</h2></div>

      ['low_stock', 'A product is low on stock'],
      ['weekly_summary', 'Weekly summary digest'],
    ];
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Email me when…</h2></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          ${ITEMS.map(([k, lbl]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line-2)">
              <div style="color:var(--soft)">${escape(lbl)}</div>
              <label class="switch"><input type="checkbox" data-nk="${k}" ${n[k] ? 'checked' : ''}/><span class="slider"></span></label>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    $$('input[data-nk]').forEach((cb) => cb.addEventListener('change', () => {
      const k = cb.dataset.nk;
      const next = { ...(Store.settings().notifications || {}), [k]: cb.checked };
      Store.updateSettings('notifications', next);
      toast('Saved');
    }));
  } else if (state.settingsTab === 'shipping') {
    const sh = s.shipping || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Shipping</h2></div>
        <div class="card-body">
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Flat rate</label><input class="input" id="ss-flat" type="number" min="0" step="1" value="${(sh.flat_rate_cents || 0) / 100}"/><div class="hint">£0 = included.</div></div>
            <div class="form-row" style="margin:0"><label>Free over</label><input class="input" id="ss-free" type="number" min="0" step="1" value="${(sh.free_threshold_cents || 0) / 100}"/></div>
          </div>
          <div class="form-row"><label>Countries serviced</label><textarea class="textarea" id="ss-c" rows="3">${escape(sh.countries_serviced || '')}</textarea></div>
          <div class="form-row"><label>Courier</label><input class="input" id="ss-cr" value="${escape(sh.courier || '')}"/></div>
          ${saveBar('shipping', () => ({
            flat_rate_cents: Math.max(0, Math.round(Number($('#ss-flat').value || 0) * 100)),
            free_threshold_cents: Math.max(0, Math.round(Number($('#ss-free').value || 0) * 100)),
            countries_serviced: $('#ss-c').value.trim(),
            courier: $('#ss-cr').value.trim(),
          }))}
        </div>
      </div>
    `;
    flushSaveBars();
  } else if (state.settingsTab === 'legal') {
    const l = s.legal || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Legal</h2></div>
        <div class="card-body">
          <div class="form-row"><label>Terms URL</label><input class="input" id="sl-t" value="${escape(l.terms_url || '')}"/></div>
          <div class="form-row"><label>Privacy URL</label><input class="input" id="sl-p" value="${escape(l.privacy_url || '')}"/></div>
          <div class="form-row"><label>Company number</label><input class="input" id="sl-cn" value="${escape(l.company_number || '')}"/></div>
          ${saveBar('legal', () => ({
            terms_url: $('#sl-t').value.trim(),
            privacy_url: $('#sl-p').value.trim(),
            company_number: $('#sl-cn').value.trim(),
          }))}
        </div>
      </div>
    `;
    flushSaveBars();
  }
};

// ---------- Drawer plumbing ----------
const openDrawer = () => {
  $('#backdrop').classList.add('open');
  $('#drawer').classList.add('open');
  setTimeout(() => $('#drawer').querySelector('input, textarea, select')?.focus(), 50);
};
const closeDrawer = () => {
  $('#backdrop').classList.remove('open');
  $('#drawer').classList.remove('open');
  state.editing = null;
  state.draftImages = [];
};

// ---------- Auth bootstrap ----------
const logout = async () => {
  try { await fetch('/api/admin/logout', { method: 'POST' }); } catch {}
  state.authed = false;
  renderLogin();
};

(async () => {
  try {
    const r = await fetch('/api/admin/session');
    const { authed } = await r.json();
    if (!authed) return renderLogin();
    state.authed = true;
    if (Store.loadRemoteAdminData) await Store.loadRemoteAdminData().catch(() => {});
    renderApp();
  } catch {
    renderLogin('Could not reach the server.');
  }
})();
