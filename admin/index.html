<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Maliki — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0a0908" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Playfair+Display:wght@400;500;600;700&family=Pinyon+Script&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0908;
    --surface:   #15130f;
    --surface-2: #1f1c17;
    --surface-3: #2a261e;
    --line:      rgba(217, 176, 112, 0.24);
    --line-2:    rgba(245, 236, 218, 0.12);
    --soft:      rgba(245, 236, 218, 0.98);
    --softer:    rgba(245, 236, 218, 0.86);
    --softest:   rgba(245, 236, 218, 0.66);
    --gold-1:    #e8c488;
    --gold-2:    #b68a4e;
    --gold-3:    #8a6531;
    --gold-hi:   #f8e3b4;
    --danger:    #e8a878;
    --danger-2:  #c46d3e;
    --ok:        #b5d39c;
    --warn:      #f0d488;
    --info:      #a4cae8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--soft);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::selection { background: rgba(232, 196, 136, 0.32); color: #fff; }

  /* ---------- Login ---------- */
  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(217, 176, 112, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 90%, rgba(0, 0, 0, 0.4) 0%, transparent 70%),
      var(--bg);
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 40px 36px;
    text-align: center;
  }
  .login-card .mark {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--softer); margin-bottom: 8px;
  }
  .login-card .logo {
    margin: 0 auto 14px;
  }
  .login-card .logo img {
    height: 110px; width: auto; display: block; margin: 0 auto;
  }
  .login-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 28px; color: #f5ecda; font-weight: 400; margin-bottom: 28px;
  }
  .login-card .field {
    border-bottom: 1px solid var(--line);
    margin-bottom: 22px;
    transition: border-color 0.4s ease;
  }
  .login-card .field:focus-within { border-color: rgba(217, 176, 112, 0.7); }
  .login-card input {
    width: 100%; background: transparent; border: 0; outline: 0;
    color: #f5ecda;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; letter-spacing: 0.2em; padding: 12px 4px; text-align: center;
  }
  .login-card input::placeholder { color: var(--softer); font-style: italic; }
  .login-card button {
    background: transparent; border: 1px solid rgba(217, 176, 112, 0.4);
    color: #f3d89e;
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 12px 24px; cursor: pointer;
    transition: color 0.4s ease, border-color 0.4s ease;
  }
  .login-card button:hover { color: var(--gold-hi); border-color: var(--gold-1); }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-card .err { margin-top: 14px; color: var(--danger); font-size: 12px; letter-spacing: 0.16em; min-height: 14px; }
  .login-card .hint {
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--softest); letter-spacing: 0.04em; line-height: 1.5;
  }

  /* ---------- App layout ---------- */
  .app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 16px;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
    /* Subtle scrollbar so it doesn't shout */
    scrollbar-width: thin;
    scrollbar-color: rgba(217, 176, 112, 0.18) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(217, 176, 112, 0.18); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: rgba(217, 176, 112, 0.32); }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 22px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 18px;
  }
  .brand img {
    height: 96px; width: auto; display: block; margin-bottom: 4px;
  }
  .brand .mt {
    font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--softer);
    margin-top: 4px;
  }
  .navlink {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 6px;
    color: var(--softer);
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
    border: 0; background: transparent; width: 100%; text-align: left;
  }
  .navlink:hover { background: var(--surface-2); color: var(--soft); }
  .navlink.active { background: var(--surface-3); color: var(--gold-1); }
  .navlink .icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }
  .navlink .badge {
    margin-left: auto;
    background: var(--surface-3);
    color: var(--softer);
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 100px; letter-spacing: 0.04em;
  }
  .navlink.active .badge { background: rgba(217, 176, 112, 0.16); color: var(--gold-1); }
  .nav-divider { height: 1px; background: var(--line-2); margin: 14px 8px; }
  .navgroup {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold-1); padding: 16px 14px 8px; font-weight: 600;
    opacity: 0.85;
  }
  .sidebar .foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line-2); }
  .sidebar .foot .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; gap: 8px; }
  .sidebar .foot .who { font-size: 11px; color: var(--softer); }
  .sidebar .foot .who strong { color: var(--soft); display: block; font-weight: 500; font-size: 13px; }
  .iconbtn {
    background: transparent; border: 1px solid var(--line);
    color: var(--softer); padding: 6px 9px;
    font-size: 11px; letter-spacing: 0.06em; cursor: pointer; border-radius: 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .iconbtn:hover { color: var(--soft); border-color: rgba(217, 176, 112, 0.4); }

  .main {
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    flex: 1; min-width: 0; gap: 12px;
  }
  .topbar h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: 24px; color: #f5ecda;
    min-width: 0;
  }
  .topbar h1 small {
    color: var(--softest); font-size: 13px; margin-left: 12px; font-style: normal;
    letter-spacing: 0.06em;
  }
  .topbar .actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

  .content { padding: 26px 28px 60px; max-width: 1320px; }

  /* ---------- Buttons / shared controls ---------- */
  .btn {
    background: linear-gradient(180deg, #d9b070 0%, #b68a4e 100%);
    border: 0; color: #1a120a; font-weight: 600;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer; border-radius: 4px;
    transition: filter 0.2s, transform 0.2s;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; border: 1px solid var(--line); color: var(--softer); font-weight: 500;
  }
  .btn.ghost:hover { color: var(--soft); border-color: rgba(217, 176, 112, 0.4); }
  .btn.danger {
    background: transparent; border: 1px solid rgba(217, 154, 108, 0.4); color: var(--danger); font-weight: 500;
  }
  .btn.danger:hover { color: var(--danger-2); border-color: rgba(217, 154, 108, 0.7); }
  .btn.sm { padding: 7px 13px; font-size: 11px; letter-spacing: 0.12em; }

  .input, .select, .textarea {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--soft);
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 4px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s ease;
  }
  .input:focus, .select:focus, .textarea:focus { border-color: rgba(217, 176, 112, 0.6); }
  .input::placeholder, .textarea::placeholder { color: var(--softest); }
  .textarea { min-height: 96px; resize: vertical; line-height: 1.5; }

  /* ---------- Stat cards ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 1100px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .stat .label {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--soft); margin-bottom: 10px; font-weight: 500;
  }
  .stat .value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 400; color: #f5ecda;
    line-height: 1.1;
  }
  .stat .delta {
    margin-top: 8px;
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--softer);
    display: flex; align-items: center; gap: 6px;
  }
  .stat .delta .up { color: var(--ok); }
  .stat .delta .down { color: var(--danger); }

  /* ---------- Cards / sections ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line-2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: 19px; color: #f5ecda;
  }
  .card-head .tools { display: flex; gap: 8px; align-items: center; }
  .card-body { padding: 18px 20px; }
  .card-body.flush { padding: 0; }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ---------- Sales chart ---------- */
  .chart {
    width: 100%; height: 220px;
    display: block;
  }
  .chart .area { fill: url(#areaGrad); }
  .chart .line { fill: none; stroke: #d9b070; stroke-width: 2; }
  .chart .grid { stroke: var(--line-2); stroke-width: 1; }
  .chart .tick { fill: var(--softest); font-size: 10px; letter-spacing: 0.04em; }
  .chart .dot { fill: #f8e3b4; }

  /* ---------- Tables ---------- */
  table.t {
    width: 100%; border-collapse: collapse;
  }
  table.t th, table.t td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--line-2);
    vertical-align: middle;
  }
  table.t th {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--soft); font-weight: 600;
    background: var(--surface);
    position: sticky; top: 0;
  }
  table.t td { color: var(--soft); font-size: 13px; }
  table.t tbody tr { cursor: pointer; transition: background 0.15s ease; }
  table.t tbody tr:hover { background: var(--surface-2); }
  table.t tbody tr.no-hover { cursor: default; background: transparent; }

  .thumb {
    width: 44px; height: 44px;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.empty { color: var(--softest); font-size: 9px; letter-spacing: 0.2em; }
  .cell-product { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .cell-product .meta { min-width: 0; }
  .cell-product .meta .t { color: #f5ecda; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .cell-product .meta .s { color: var(--softer); font-size: 11px; letter-spacing: 0.06em; }

  .pill {
    display: inline-block;
    padding: 3px 10px;
    border: 1px solid var(--line);
    border-radius: 100px;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--softer); white-space: nowrap; font-weight: 500;
  }
  .pill.live { color: var(--ok); border-color: rgba(163, 192, 139, 0.35); }
  .pill.draft { color: var(--softest); }
  .pill.pending { color: var(--warn); border-color: rgba(226, 195, 115, 0.35); }
  .pill.paid { color: var(--info); border-color: rgba(141, 180, 212, 0.35); }
  .pill.fulfilled { color: var(--ok); border-color: rgba(163, 192, 139, 0.35); }
  .pill.refunded { color: var(--danger); border-color: rgba(217, 154, 108, 0.35); }
  .pill.failed { color: var(--danger); border-color: rgba(217, 154, 108, 0.35); }
  .pill.featured { color: var(--gold-1); border-color: rgba(217, 176, 112, 0.35); }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .toolbar .left { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar .input { width: 280px; }

  .filterbtn {
    background: transparent; border: 1px solid var(--line);
    color: var(--softer); font-size: 12px; letter-spacing: 0.04em;
    padding: 8px 14px; border-radius: 4px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .filterbtn:hover { color: var(--soft); }
  .filterbtn.active { color: var(--gold-1); border-color: rgba(217, 176, 112, 0.5); background: rgba(217, 176, 112, 0.06); }

  /* ---------- Activity / lists ---------- */
  .list-item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 4px 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-2);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .list-item:hover { background: var(--surface-2); }
  .list-item:last-child { border-bottom: 0; }
  .list-item .who { color: #f5ecda; font-weight: 500; }
  .list-item .who small { color: var(--softer); font-weight: 400; margin-left: 6px; font-size: 12px; }
  .list-item .right { text-align: right; }
  .list-item .right .amt { color: #f5ecda; font-weight: 500; }
  .list-item .right .when { color: var(--softest); font-size: 11px; letter-spacing: 0.08em; }
  .list-item .what { grid-column: 1 / -1; color: var(--softer); font-size: 12px; }

  /* ---------- Drawer ---------- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 50;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh;
    width: min(640px, 100%);
    background: var(--surface);
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.2,.7,.2,1);
    z-index: 60;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line-2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .drawer header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400; font-size: 22px; color: #f5ecda;
  }
  .drawer .body { padding: 22px 24px 100px; overflow-y: auto; flex: 1; }
  .drawer footer {
    padding: 14px 24px;
    border-top: 1px solid var(--line-2);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: var(--surface);
  }
  .drawer footer .feedback { flex: 1; font-size: 12px; color: var(--softer); }
  .feedback.error { color: var(--danger); }
  .feedback.ok { color: var(--ok); }

  /* ---------- Form ---------- */
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .form-row.split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row.split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-row > label, .form-row > .lbl {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--soft); font-weight: 500;
  }
  .form-row .hint { font-size: 11px; color: var(--softest); }
  .checkbox {
    display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .checkbox input { width: 16px; height: 16px; accent-color: #d9b070; }
  .checkbox span {
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--soft);
  }

  /* ---------- Image dropzone ---------- */
  .dropzone {
    border: 1.5px dashed var(--line);
    background: rgba(255,255,255,0.015);
    border-radius: 6px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .dropzone:hover, .dropzone.over {
    border-color: rgba(217, 176, 112, 0.55);
    background: rgba(217, 176, 112, 0.04);
  }
  .dropzone .dz-title {
    font-size: 13px; color: var(--soft); letter-spacing: 0.04em; margin-bottom: 4px;
  }
  .dropzone .dz-sub { font-size: 11px; color: var(--softest); letter-spacing: 0.04em; }
  .img-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px;
  }
  .img-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    overflow: hidden;
  }
  .img-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-tile .rm {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(10, 9, 8, 0.85); color: var(--soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 12px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .img-tile .rm:hover { color: var(--danger); border-color: rgba(217, 154, 108, 0.5); }
  .img-tile .cover-tag {
    position: absolute; bottom: 4px; left: 4px;
    background: rgba(217, 176, 112, 0.92); color: #1a120a;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
    padding: 2px 6px; border-radius: 2px;
  }

  /* ---------- Order detail / customer detail ---------- */
  .detail-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 18px;
  }
  .detail-meta .label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-1);
    margin-bottom: 6px; font-weight: 500;
  }
  .detail-meta .value { color: var(--soft); font-size: 14px; }
  .detail-meta .value.lg { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #f5ecda; font-style: italic; }

  .line-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .line-item:last-child { border-bottom: 0; }
  .line-item .info { flex: 1; }
  .line-item .info .t { color: #f5ecda; font-weight: 500; }
  .line-item .info .s { color: var(--softer); font-size: 11px; letter-spacing: 0.06em; }
  .line-item .qty { color: var(--softer); font-size: 13px; padding: 0 12px; }
  .line-item .amt { color: #f5ecda; font-weight: 500; }

  .totals { padding-top: 12px; }
  .totals .row {
    display: flex; justify-content: space-between; padding: 6px 0;
    font-size: 13px; color: var(--soft);
  }
  .totals .row.total {
    border-top: 1px solid var(--line-2);
    margin-top: 6px;
    padding-top: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #f5ecda;
  }

  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--softest); font-style: italic;
  }
  .empty strong {
    display: block; font-style: normal;
    font-family: 'Playfair Display', serif;
    font-size: 14px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--soft); margin-bottom: 12px;
  }

  /* ---------- Sub-tabs (within a section) ---------- */
  .subtabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .subtab {
    background: transparent; border: 0;
    color: var(--softer);
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 12px 18px; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .subtab:hover { color: var(--soft); }
  .subtab.active { color: var(--gold-1); border-color: var(--gold-2); }

  /* ---------- Bar chart ---------- */
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 200px; padding: 8px 0; }
  .bar {
    flex: 1; min-width: 0;
    background: linear-gradient(180deg, rgba(217,176,112,0.6) 0%, rgba(217,176,112,0.18) 100%);
    border-top: 2px solid var(--gold-1);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: opacity 0.3s ease;
  }
  .bar:hover { opacity: 1; }
  .bar { opacity: 0.85; }
  .bar .lbl {
    position: absolute; left: 0; right: 0; bottom: -22px;
    text-align: center; font-size: 10px; color: var(--softest); letter-spacing: 0.04em;
  }
  .bar .v {
    position: absolute; left: 0; right: 0; top: -18px;
    text-align: center; font-size: 10px; color: var(--softer); letter-spacing: 0.04em;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .bar:hover .v { opacity: 1; }

  /* ---------- Donut ---------- */
  .donut-wrap { display: flex; gap: 24px; align-items: center; }
  .donut-svg { width: 180px; height: 180px; flex-shrink: 0; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .donut-legend .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--line-2);
    font-size: 13px;
  }
  .donut-legend .row:last-child { border-bottom: 0; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 10px; vertical-align: middle; }

  /* ---------- Email template card grid ---------- */
  .tpl-section { margin-bottom: 28px; }
  .tpl-section-label {
    font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase;
    color: var(--softest); margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .tpl-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 900px) { .tpl-grid { grid-template-columns: 1fr; } }
  .tpl-card {
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 16px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s ease, transform 0.15s ease;
    position: relative;
  }
  .tpl-card:hover { border-color: rgba(217, 176, 112, 0.45); transform: translateY(-1px); }
  .tpl-card.disabled { opacity: 0.55; }
  .tpl-card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .tpl-badge {
    font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 3px;
  }
  .tpl-badge.auto { background: rgba(217,176,112,0.14); color: var(--gold-1); }
  .tpl-badge.broadcast { background: rgba(163,192,139,0.13); color: #a3c08b; }
  .tpl-card h3 {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400;
    font-size: 20px; color: #f5ecda; margin-bottom: 6px;
  }
  .tpl-card .desc { color: var(--softer); font-size: 12px; line-height: 1.5; margin-bottom: 12px; }
  .tpl-card .stats { display: flex; gap: 12px; font-size: 11px; color: var(--softest); letter-spacing: 0.04em; }

  /* Campaign form */
  .campaign-box {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 6px; padding: 24px 26px; max-width: 520px;
  }
  .campaign-box h3 {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 20px; color: #f5ecda; margin-bottom: 18px; font-weight: 400;
  }
  .campaign-preview {
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 4px; padding: 12px 16px; margin: 12px 0;
    font-size: 13px; color: var(--softer); line-height: 1.6;
  }
  .campaign-preview strong { color: var(--soft); }

  /* Email preview panel inside drawer */
  .email-preview {
    background: #f5ecda;
    color: #1a120a;
    padding: 32px;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    border: 1px solid var(--line-2);
  }
  .email-preview .ep-from {
    font-size: 11px; letter-spacing: 0.08em; color: #6b5837;
    padding-bottom: 14px; border-bottom: 1px solid #d6c596; margin-bottom: 18px;
  }
  .email-preview .ep-subject {
    font-weight: 500; font-size: 18px; margin-bottom: 16px; color: #1a120a;
  }

  /* ---------- Progress (usage) ---------- */
  .progress {
    width: 100%; height: 4px; background: var(--surface-3); border-radius: 4px; overflow: hidden;
  }
  .progress > span { display: block; height: 100%; background: var(--gold-1); }

  /* ---------- Settings layout ---------- */
  .settings-layout {
    display: grid; grid-template-columns: 200px 1fr; gap: 28px;
  }
  @media (max-width: 880px) { .settings-layout { grid-template-columns: 1fr; } }
  .settings-nav {
    display: flex; flex-direction: column; gap: 2px;
  }
  .settings-nav button {
    background: transparent; border: 0; color: var(--softer);
    text-align: left; padding: 10px 14px; border-radius: 4px;
    font-size: 13px; cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .settings-nav button:hover { background: var(--surface-2); color: var(--soft); }
  .settings-nav button.active { background: var(--surface-3); color: var(--gold-1); }
  .settings-section { display: flex; flex-direction: column; gap: 18px; }

  .integration-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border: 1px solid var(--line);
    border-radius: 6px; background: var(--surface);
  }
  .integration-card .info .name { color: #f5ecda; font-weight: 500; margin-bottom: 4px; }
  .integration-card .info .meta { font-size: 12px; color: var(--softer); }

  /* Toggle switch */
  .switch {
    position: relative; display: inline-block;
    width: 38px; height: 22px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--surface-3); border: 1px solid var(--line);
    border-radius: 22px; transition: background 0.2s ease;
  }
  .switch .slider:before {
    content: ''; position: absolute;
    height: 14px; width: 14px; left: 3px; top: 50%; transform: translateY(-50%);
    background: var(--soft); border-radius: 50%; transition: transform 0.2s ease;
  }
  .switch input:checked + .slider { background: linear-gradient(180deg, #d9b070, #b68a4e); border-color: transparent; }
  .switch input:checked + .slider:before { transform: translateY(-50%) translateX(16px); background: #1a120a; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 18px;
    color: var(--soft);
    font-size: 13px;
    transform: translateY(20px); opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 100; max-width: 360px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: rgba(163, 192, 139, 0.5); }
  .toast.err { border-color: rgba(217, 154, 108, 0.5); }

  /* ---------- Mobile menu toggle ---------- */
  .menu-toggle {
    display: none;
    align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--line);
    color: var(--soft); cursor: pointer;
    width: 38px; height: 38px;
    border-radius: 4px; padding: 0;
    flex-shrink: 0;
  }
  .menu-toggle:hover { color: var(--gold-1); border-color: rgba(217, 176, 112, 0.5); }
  .menu-toggle svg { width: 18px; height: 18px; }
  .sidebar-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 40;
  }
  .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

  /* ---------- Tablet ---------- */
  @media (max-width: 1024px) {
    .topbar { padding: 16px 20px; }
    .content { padding: 22px 20px 60px; }
    .toolbar .input { width: 220px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 280px; max-width: 86vw; height: 100vh;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(.2,.7,.2,1);
      overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop { display: block; }

    .menu-toggle { display: inline-flex; }

    .topbar {
      padding: 14px 16px;
      gap: 10px;
    }
    .topbar-inner { flex-wrap: wrap; gap: 8px 12px; }
    .topbar h1 {
      font-size: 20px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden; text-overflow: ellipsis;
    }
    .topbar h1 small {
      display: block;
      margin-left: 0; margin-top: 2px;
      font-size: 11px;
    }
    .topbar .actions {
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .topbar .actions .btn { padding: 8px 12px; font-size: 11px; letter-spacing: 0.1em; }

    .content { padding: 18px 16px 60px; }

    .stat-grid { grid-template-columns: 1fr; gap: 12px; margin-bottom: 18px; }
    .stat { padding: 16px; }
    .stat .value { font-size: 28px; }

    .grid-2 { gap: 12px; }
    .card-head { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
    .card-head h2 { font-size: 17px; }
    .card-body { padding: 14px 16px; }

    .toolbar { gap: 10px; margin-bottom: 14px; }
    .toolbar .left { width: 100%; }
    .toolbar .input { width: 100%; }

    /* Tables: horizontal scroll inside flush card bodies */
    .card-body.flush { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.t th, table.t td { padding: 10px 12px; }
    .cell-product .meta .t { max-width: 180px; }

    /* Settings / forms stack */
    .form-row.split-2, .form-row.split-3 { grid-template-columns: 1fr; }
    .detail-meta { grid-template-columns: 1fr; gap: 12px; }

    /* Donut chart stacks */
    .donut-wrap { flex-direction: column; align-items: stretch; gap: 18px; }
    .donut-svg { margin: 0 auto; }

    /* Image grid tighter */
    .img-grid { grid-template-columns: repeat(3, 1fr); }

    /* Drawer footer wrap on small screens */
    .drawer header { padding: 14px 16px; }
    .drawer .body { padding: 18px 16px 100px; }
    .drawer footer { padding: 12px 16px; flex-wrap: wrap; }
  }

  @media (max-width: 420px) {
    .img-grid { grid-template-columns: repeat(2, 1fr); }
    .topbar h1 { font-size: 18px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="/assets/ring-svg.js"></script>
<script src="/assets/store.js"></script>
<script src="/assets/supabase-sync.js"></script>
<script src="/assets/image-upload.js"></script>

<script>
'use strict';

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

const escape = (s) =>
  String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );

const fmtPrice = (cents, currency) => {
  try {
    return new Intl.NumberFormat('en-GB', {
      style: 'currency', currency: currency || 'GBP',
      minimumFractionDigits: 0, maximumFractionDigits: 2,
    }).format((cents || 0) / 100);
  } catch { return `£${((cents || 0) / 100).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`; }
};

const fmtDate = (iso, opts = { dateStyle: 'medium' }) => {
  try { return new Date(iso).toLocaleString(undefined, opts); } catch { return iso; }
};

const fmtRel = (iso) => {
  const ms = new Date(iso).getTime() - Date.now();
  const min = Math.round(ms / 60000);
  const fmt = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  if (Math.abs(min) < 60) return fmt.format(min, 'minute');
  const hr = Math.round(min / 60);
  if (Math.abs(hr) < 24) return fmt.format(hr, 'hour');
  const d = Math.round(hr / 24);
  return fmt.format(d, 'day');
};

const slugify = (s) =>
  String(s || '').toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80);

const toast = (msg, kind = 'ok') => {
  const t = document.createElement('div');
  t.className = `toast ${kind}`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2600);
};

window.addEventListener('maliki:sync-error', (e) => toast(e.detail || 'Sync failed — changes may not have saved', 'err'));

// ---------- adminFetch (auto-reload on 401) ----------
const adminFetch = async (url, opts = {}) => {
  const r = await fetch(url, { credentials: 'same-origin', ...opts });
  if (r.status === 401) { location.reload(); throw new Error('unauthorized'); }
  return r;
};

// ---------- Drawer keyboard helpers ----------
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.querySelector('.drawer.open')) { closeDrawer(); }
  }
  if (e.key !== 'Tab') return;
  const drawer = document.querySelector('.drawer.open');
  if (!drawer) return;
  const focusables = drawer.querySelectorAll('a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])');
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
});

// Tiny inline icons (16x16). Stroke uses currentColor.
const icon = (name) => {
  const paths = {
    overview: '<path d="M3 3h7v7H3zM13 3h6v4h-6zM13 9h6v8h-6zM3 13h7v6H3z"/>',
    products: '<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/>',
    orders: '<path d="M4 6h16M4 12h16M4 18h10"/>',
    customers: '<circle cx="9" cy="8" r="3.5"/><path d="M2.5 19c0-3 3-5.5 6.5-5.5s6.5 2.5 6.5 5.5"/><circle cx="17" cy="9" r="2.5"/><path d="M14 19c0-2.2 1.8-4 4-4 1.8 0 3.3 1.2 3.8 3"/>',
    subscribers: '<path d="M3 8l9 6 9-6"/><rect x="3" y="6" width="18" height="14" rx="2"/>',
    discounts: '<path d="M20 12L12 4H4v8l8 8z"/><circle cx="8" cy="8" r="1.5"/>',
    emails: '<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 7 9-7"/>',
    analytics: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
    reports: '<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>',
    content: '<path d="M5 4h14v16H5z"/><path d="M8 8h8M8 12h8M8 16h5"/>',
    settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3 1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8 1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/>',
    shop: '<path d="M5 4h14l-1 4H6zM5 8h14v11H5z"/><path d="M9 11v3M15 11v3"/>',
    out: '<path d="M14 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4M10 17l-5-5 5-5M5 12h11"/>',
    review: '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>',
    alerts: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>',
  };
  return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${paths[name] || ''}</svg>`;
};

// ---------- State ----------
const state = {
  authed: false,
  view: 'overview',
  selectedOrder: null,
  selectedCustomer: null,
  productFilter: '',
  orderFilter: 'all',
  customerFilter: '',
  subscriberFilter: '',
  emailTab: 'templates', // templates | campaigns | activity
  campaignPreview: null,
  emailFilter: 'all',
  settingsTab: 'general',
  reportsRange: '90', // days
  analyticsRange: 30, // days, for analytics panel
  analyticsCache: null, // last fetched analytics payload
  editing: null,
  draftImages: [],
  reviewsFilter: 'pending', // pending | approved | all
  _reviewsBadge: null, // set after first fetch
};

// ---------- Login ----------
const renderLogin = (errMsg = '') => {
  $('#root').innerHTML = `
    <div class="login-wrap">
      <form class="login-card" id="loginForm">
        <div class="logo"><img src="/assets/maliki-logo.svg" alt="Maliki Atelier"></div>
        <h1>Admin</h1>
        <div class="field">
          <input id="em" type="email" autocomplete="email" placeholder="Email address" autofocus />
        </div>
        <div class="field">
          <input id="pw" type="password" autocomplete="current-password" placeholder="Password" />
        </div>
        <button type="submit" id="loginBtn">Enter</button>
        <div class="err" id="loginErr">${escape(errMsg)}</div>
        <div class="hint">Sign in with your Maliki Atelier admin account.</div>
      </form>
    </div>
  `;
  $('#loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = $('#em').value.trim();
    const password = $('#pw').value;
    const btn = $('#loginBtn');
    const err = $('#loginErr');
    btn.disabled = true; btn.textContent = '…'; err.textContent = '';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) {
        const msg = res.status === 429 ? 'Too many attempts. Try again later.'
          : res.status === 403 ? 'Account does not have admin access.'
          : 'Incorrect email or password.';
        err.textContent = msg;
        btn.disabled = false; btn.textContent = 'Enter'; return;
      }
      state.authed = true;
      if (Store.loadRemoteAdminData) await Store.loadRemoteAdminData().catch(() => {});
      renderApp();
    } catch {
      err.textContent = 'Sign-in failed.';
      btn.disabled = false; btn.textContent = 'Enter';
    }
  });
};

// ---------- App shell ----------
const renderApp = () => {
  $('#root').innerHTML = `
    <div class="app">
      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div>
            <img src="/assets/maliki-logo.svg" alt="Maliki Atelier">
            <div class="mt">Admin</div>
          </div>
        </div>

        <div class="navgroup">Commerce</div>
        <button class="navlink" data-view="overview">${icon('overview')} <span>Overview</span></button>
        <button class="navlink" data-view="orders">${icon('orders')} <span>Orders</span> <span class="badge" data-badge="orders"></span></button>
        <button class="navlink" data-view="products">${icon('products')} <span>Products</span> <span class="badge" data-badge="products"></span></button>
        <button class="navlink" data-view="customers">${icon('customers')} <span>Customers</span> <span class="badge" data-badge="customers"></span></button>

        <div class="navgroup">Grow</div>
        <button class="navlink" data-view="subscribers">${icon('subscribers')} <span>Subscribers</span> <span class="badge" data-badge="subscribers"></span></button>
        <button class="navlink" data-view="discounts">${icon('discounts')} <span>Discounts</span> <span class="badge" data-badge="discounts"></span></button>

// ---------- Overview ----------
const computeStats = () => {
  const orders = Store.orders().filter((o) => o.status !== 'refunded');
  const now = Date.now();
  const within = (iso, days) => (now - new Date(iso).getTime()) <= days * 86400000;
  const between = (iso, from, to) => {
    const t = new Date(iso).getTime();
    return now - t >= from * 86400000 && now - t < to * 86400000;
  };

  const last30 = orders.filter((o) => within(o.created_at, 30));
  const prev30 = orders.filter((o) => between(o.created_at, 30, 60));

  const sum = (arr) => arr.reduce((s, o) => s + o.total_cents, 0);
  const rev = sum(last30);
  const prevRev = sum(prev30);
  const aov = last30.length ? Math.round(rev / last30.length) : 0;
  const prevAov = prev30.length ? Math.round(prevRev / prev30.length) : 0;

  const pct = (a, b) => {
    if (b === 0) return a === 0 ? 0 : 100;
    return Math.round(((a - b) / b) * 100);
  };

  return {
    revenue: rev, revDelta: pct(rev, prevRev),
    orders: last30.length, ordDelta: pct(last30.length, prev30.length),
    customers: Store.customers().length,
    aov, aovDelta: pct(aov, prevAov),
    seriesByDay: (() => {
      const buckets = new Array(30).fill(0);
      for (const o of last30) {
        const day = Math.floor((now - new Date(o.created_at).getTime()) / 86400000);
        if (day >= 0 && day < 30) buckets[29 - day] += o.total_cents;
      }
      return buckets;
    })(),
  };
};

const renderChart = (series) => {
  const W = 800, H = 220, P = { l: 36, r: 16, t: 16, b: 26 };
  const w = W - P.l - P.r;
  const h = H - P.t - P.b;
  const max = Math.max(1, ...series);
  const xStep = w / (series.length - 1);
  const pts = series.map((v, i) => [P.l + i * xStep, P.t + h - (v / max) * h]);
  const path = pts.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(' ');
  const areaPath = `${path} L${P.l + w},${P.t + h} L${P.l},${P.t + h} Z`;
  const ticks = [0, max / 2, max].map((v, i) => {
    const y = P.t + h - (v / max) * h;
    return `<g><line class="grid" x1="${P.l}" y1="${y}" x2="${P.l + w}" y2="${y}"/><text class="tick" x="${P.l - 6}" y="${y + 3}" text-anchor="end">${fmtPrice(v)}</text></g>`;
  }).join('');
  const xLabels = [29, 22, 15, 8, 1].map((daysBack) => {
    const d = new Date(Date.now() - daysBack * 86400000);
    const i = 29 - daysBack;
    const x = P.l + i * xStep;
    return `<text class="tick" x="${x}" y="${H - 6}" text-anchor="middle">${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</text>`;
  }).join('');

  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(217,176,112,0.32)"/>
          <stop offset="100%" stop-color="rgba(217,176,112,0)"/>
        </linearGradient>
      </defs>
      ${ticks}
      <path class="area" d="${areaPath}"/>
      <path class="line" d="${path}"/>
      ${xLabels}
    </svg>
  `;
};

const topProductsByRevenue = (n = 5) => {
  const orders = Store.orders().filter((o) => o.status !== 'refunded');
  const map = new Map();
  for (const o of orders) {
    for (const it of o.items) {
      const cur = map.get(it.product_id) || { id: it.product_id, title: it.title, image: it.image, units: 0, revenue: 0 };
      cur.units += it.quantity;
      cur.revenue += it.price_cents * it.quantity;
      map.set(it.product_id, cur);
    }
  }
  return Array.from(map.values()).sort((a, b) => b.revenue - a.revenue).slice(0, n);
};

const handleFiles = async (fileList) => {
  const files = Array.from(fileList || []);
  const remaining = 8 - state.draftImages.length;
  if (remaining <= 0) { toast('Up to 8 images per product', 'err'); return; }
  for (const f of files.slice(0, remaining)) {
    try {
      const dataUrl = await ImageUpload.resizeToJpeg(f);
      state.draftImages.push(dataUrl);
      renderDraftImages();
    } catch (e) {
      toast(`Couldn't read ${f.name}`, 'err');
    }
  }
};

const collectProductForm = () => {
  const priceUnits = Number($('#f-price').value);
  const stockRaw = $('#f-stock').value.trim();
  const engMaxRaw = $('#f-engraving-max') ? Number($('#f-engraving-max').value) : 20;
  return {
    title: $('#f-title').value.trim(),
    subtitle: $('#f-subtitle').value.trim(),
    slug: slugify($('#f-slug').value),
    currency: ($('#f-currency').value || 'GBP').toUpperCase().slice(0, 3),
    price_cents: Number.isFinite(priceUnits) ? Math.round(priceUnits * 100) : 0,
    stock: stockRaw === '' ? null : Math.max(0, Math.floor(Number(stockRaw) || 0)),
    metal: $('#f-metal').value.trim(),
    stone: $('#f-stone').value.trim(),
    hand_size: $('#f-size').value.trim(),
    description: $('#f-desc').value,
    images: state.draftImages,
    published: $('#f-pub').checked,
    featured: $('#f-feat').checked,
    engraving_enabled: $('#f-engraving') ? $('#f-engraving').checked : false,
    engraving_label: $('#f-engraving-label') ? $('#f-engraving-label').value.trim() : '',
    engraving_max_chars: Number.isFinite(engMaxRaw) && engMaxRaw > 0 ? Math.round(engMaxRaw) : 20,
  };
};

const saveProduct = async () => {
  const fb = $('#prodFeedback');
  const btn = $('#prodSave');
  fb.className = 'feedback';
  const data = collectProductForm();
  if (!data.title) { fb.textContent = 'Title is required.'; fb.className = 'feedback error'; return; }
  if (!data.slug)  { fb.textContent = 'Slug is required.';  fb.className = 'feedback error'; return; }

  btn.disabled = true; btn.dataset.label = btn.textContent; btn.textContent = 'Saving…';
  try {
    let product;
    if (state.editing === 'new') {
      product = Store.addProduct(data);
      if (product.remoteSync) await product.remoteSync;
      toast('Product created');
    } else {
      product = Store.updateProduct(state.editing, data);
      if (product?.remoteSync) await product.remoteSync;
      toast('Product updated');
    }
    closeDrawer();
  } catch (e) {
    fb.textContent = e.message === 'product_sync_failed'
      ? 'Could not save. Please try again.'
      : (e.message || 'Save failed.');
    fb.className = 'feedback error';
  } finally {
    btn.disabled = false; btn.textContent = btn.dataset.label || 'Save';
  }
};

const deleteProductFromDrawer = (id) => {
  const p = Store.productById(id);
  if (!p) return;
  if (!confirm(`Delete "${p.title}"? This cannot be undone.`)) return;
  Store.deleteProduct(id);
  toast('Product deleted');
  closeDrawer();
};

    </div>

    <div class="card">
      <div class="card-body flush">
        <table class="t">
          <thead><tr><th>Email</th><th>Source</th><th>Status</th><th>Subscribed</th><th></th></tr></thead>
          <tbody>
            ${filtered.length === 0
              ? '<tr class="no-hover"><td colspan="5"><div class="empty">No subscribers match.</div></td></tr>'
              : filtered.map((s) => `
                <tr class="no-hover" data-sid="${escape(s.id)}">
                  <td><strong style="color:#f5ecda">${escape(s.email)}</strong></td>
                  <td><span class="pill">${escape(s.source)}</span></td>
                  <td><span class="pill ${s.status === 'subscribed' ? 'live' : 'draft'}">${escape(s.status)}</span></td>
                  <td style="color:var(--softer)">${escape(fmtDate(s.subscribed_at))}</td>
                  <td>
                    <div class="actions" style="display:flex;gap:6px;justify-content:flex-end">
                      ${s.status === 'subscribed'
                        ? `<button class="btn ghost sm" data-act="unsub">Unsubscribe</button>`
                        : `<button class="btn ghost sm" data-act="resub">Re-subscribe</button>`}
                      <button class="btn danger sm" data-act="rm">Remove</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  $('#subSearch').addEventListener('input', (e) => {
    state.subscriberFilter = e.target.value; render(); $('#subSearch').focus();
  });
  $$('tr[data-sid]').forEach((tr) => {
    const id = tr.dataset.sid;
    tr.querySelectorAll('button[data-act]').forEach((b) => {
      b.addEventListener('click', () => {
        if (b.dataset.act === 'unsub') { Store.updateSubscriber(id, { status: 'unsubscribed' }); toast('Unsubscribed'); }
        else if (b.dataset.act === 'resub') { Store.updateSubscriber(id, { status: 'subscribed' }); toast('Re-subscribed'); }
        else if (b.dataset.act === 'rm') {
          if (confirm('Remove this subscriber?')) { Store.removeSubscriber(id); toast('Removed'); }
        }
      });
    });
  });
};

const openAddSubscriber = () => {

    <div class="feedback" id="subFb"></div>
    <button class="btn ghost" id="subCancel">Cancel</button>

const exportSubscribersCsv = () => {
  const rows = [['email', 'source', 'status', 'subscribed_at']];
  Store.subscribers().forEach((s) => rows.push([s.email, s.source, s.status, s.subscribed_at]));
  const csv = rows.map((r) => r.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `maliki-subscribers-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

  $('#drawerBody').innerHTML = `
    <div class="form-row">
      <label for="d-code">Code</label>
      <input class="input" id="d-code" value="${escape(d?.code || '')}" placeholder="e.g. ATELIER10" autofocus maxlength="40" />

        <label for="d-min">Minimum spend</label>

        <label for="d-limit">Usage limit</label>
        <input class="input" id="d-limit" type="number" min="0" step="1" value="${d?.usage_limit || ''}" placeholder="Leave blank for unlimited" />
      </div>
    </div>
    <div class="form-row split-2">
      <div class="form-row" style="margin:0">
        <label for="d-starts">Starts on</label>
        <input class="input" id="d-starts" type="date" value="${d?.starts_at ? d.starts_at.slice(0, 10) : new Date().toISOString().slice(0, 10)}" />
      </div>
      <div class="form-row" style="margin:0">
        <label for="d-ends">Ends on</label>
        <input class="input" id="d-ends" type="date" value="${d?.ends_at ? d.ends_at.slice(0, 10) : ''}" />
      </div>
    </div>
    <div class="form-row">
      <label for="d-status">Status</label>
      <select class="select" id="d-status">
        <option value="active" ${d?.status === 'active' || !d ? 'selected' : ''}>Active</option>
        <option value="scheduled" ${d?.status === 'scheduled' ? 'selected' : ''}>Scheduled</option>
        <option value="paused" ${d?.status === 'paused' ? 'selected' : ''}>Paused</option>
        <option value="expired" ${d?.status === 'expired' ? 'selected' : ''}>Expired</option>
      </select>
    </div>
    <div class="form-row">
      <label for="d-desc">Internal note</label>
      <textarea class="textarea" id="d-desc" rows="3" placeholder="Optional — for staff only">${escape(d?.description || '')}</textarea>
    </div>
  `;

  const updateValueHint = () => {
    const t = $('#d-type').value;
    $('#dValueHint').textContent = t === 'percent' ? '0–100, percentage off' : 'In whole £, e.g. 50 = £50 off';
  };
  $('#d-type').addEventListener('change', updateValueHint);
  updateValueHint();

  $('#dscCancel').addEventListener('click', closeDrawer);
  $('#dscSave').addEventListener('click', async () => {
    const fb = $('#dscFb');
    const btn = $('#dscSave');
    const type = $('#d-type').value;
    const valNum = Number($('#d-value').value);
    const data = {
      code: $('#d-code').value.trim(),
      type,
      value: type === 'percent' ? Math.max(0, Math.min(100, valNum)) : Math.max(0, Math.round(valNum * 100)),
      minimum_cents: Math.max(0, Math.round(Number($('#d-min').value || 0) * 100)),
      usage_limit: $('#d-limit').value ? Math.max(0, Math.floor(Number($('#d-limit').value))) : null,
      starts_at: $('#d-starts').value ? new Date($('#d-starts').value).toISOString() : new Date().toISOString(),
      ends_at: $('#d-ends').value ? new Date($('#d-ends').value).toISOString() : null,
      status: $('#d-status').value,
      description: $('#d-desc').value,
    };
    if (!data.code) { fb.textContent = 'Code is required.'; fb.className = 'feedback error'; return; }
    btn.disabled = true; btn.dataset.label = btn.textContent; btn.textContent = 'Saving…';
    try {
      if (d) Store.updateDiscount(d.id, data); else Store.addDiscount(data);
      toast(d ? 'Discount updated' : 'Discount created');
      closeDrawer();
    } catch (e) {
      fb.textContent = e.message === 'code_taken' ? 'That code is already in use.' : 'Save failed.';
      fb.className = 'feedback error';
    } finally {
      btn.disabled = false; btn.textContent = btn.dataset.label || 'Save';
    }
  });
  if (d) $('#dscDelete').addEventListener('click', () => {
    if (confirm(`Delete code ${d.code}?`)) { Store.deleteDiscount(d.id); toast('Deleted'); closeDrawer(); }
  });

  openDrawer();
};

  win_back:           { trigger: 'broadcast', triggerDesc: 'Send manually to customers with no order in 12+ months.' },
  review_request:     { trigger: 'broadcast', triggerDesc: 'Send manually to customers 2+ weeks after fulfilment.' },

const renderEmails = () => {
  const templates = Store.emailTemplates();
  const log = Store.emails();
  const enabledCount = templates.filter((t) => t.enabled).length;

  $('#topbar').innerHTML = `<h1>Emails <small>${log.length} sent · ${enabledCount} active</small></h1>`;

  const subtabs = `
    <div class="subtabs">
      <button class="subtab ${state.emailTab === 'templates' ? 'active' : ''}" data-tab="templates">Templates</button>
      <button class="subtab ${state.emailTab === 'campaigns' ? 'active' : ''}" data-tab="campaigns">Campaigns</button>
      <button class="subtab ${state.emailTab === 'activity' ? 'active' : ''}" data-tab="activity">Activity</button>
    </div>
  `;

  if (state.emailTab === 'templates') {
    const counts = templates.reduce((m, t) => {
      m[t.key] = log.filter((e) => e.template_key === t.key).length;
      return m;
    }, {});

    const autoTpls = templates.filter((t) => (TEMPLATE_META[t.key]?.trigger || 'auto') === 'auto');
    const broadcastTpls = templates.filter((t) => TEMPLATE_META[t.key]?.trigger === 'broadcast');

    const renderCard = (t) => {
      const meta = TEMPLATE_META[t.key] || {};
      const trigger = meta.trigger || 'auto';
      return `
        <div class="tpl-card ${t.enabled ? '' : 'disabled'}" data-tk="${escape(t.key)}">
          <div class="tpl-card-head">
            <span class="tpl-badge ${trigger}">${trigger === 'auto' ? 'Auto' : 'Broadcast'}</span>
            <label class="switch" data-toggle>
              <input type="checkbox" ${t.enabled ? 'checked' : ''} data-tkey="${escape(t.key)}" />
              <span class="slider"></span>
            </label>
          </div>
          <h3>${escape(t.name || t.key)}</h3>
          <div class="desc">${escape(t.description || meta.triggerDesc || '')}</div>
          <div class="stats">
            <span>Subject: <em style="color:var(--soft)">${escape((t.subject || '').replace(/\{\{(\w+)\}\}/g, '⟨$1⟩').slice(0, 60))}</em></span>
          </div>
          <div class="stats" style="margin-top:6px">
            <span>${counts[t.key] || 0} sent</span>
            <span>·</span>
            <span>${t.enabled ? '<span style="color:var(--ok)">Active</span>' : 'Inactive'}</span>
          </div>
        </div>`;
    };

    $('#content').innerHTML = `
      ${subtabs}
      <div class="tpl-section">
        <div class="tpl-section-label">Automations — fire automatically based on customer actions</div>
        <div class="tpl-grid">${autoTpls.map(renderCard).join('')}</div>
      </div>
      <div class="tpl-section">
        <div class="tpl-section-label">Broadcasts — you send these manually to a chosen audience</div>
        <div class="tpl-grid">${broadcastTpls.map(renderCard).join('')}</div>
      </div>
    `;

    // Card click → open drawer (but not if clicking the toggle)
    $$('.tpl-card').forEach((c) => {
      c.addEventListener('click', (e) => {
        if (e.target.closest('[data-toggle]')) return;
        openTemplateDrawer(c.dataset.tk);
      });
    });

    // Toggle → update enabled state
    $$('input[data-tkey]').forEach((cb) => {
      cb.addEventListener('change', () => {
        const key = cb.dataset.tkey;
        Store.updateTemplate(key, { enabled: cb.checked });
        cb.closest('.tpl-card').classList.toggle('disabled', !cb.checked);
        cb.closest('.tpl-card').querySelector('.stats span:last-child').innerHTML =

      });

              <option value="new">New — first order in last 30 days</option>
              ${countries.map((c) => `<option value="country:${escape(c)}">Country: ${escape(c)}</option>`).join('')}
            </select>
          </div>

            <div class="campaign-preview" id="cmpPreviewBox"></div>

              <tr>

                <th>Reviewer</th>
                <th>Rating</th>
                <th>Review</th>
                <th>Date</th>
                <th>Status</th>

              </tr>
            </thead>
            <tbody>
              ${list.length === 0

                  <tr class="no-hover" data-rvid="${escape(rv.id)}">

                      <div style="color:#f5ecda;font-weight:500">${escape(rv.reviewer_name || '—')}</div>
                      <div style="color:var(--softer);font-size:11px">${escape(rv.reviewer_email || '')}</div>
                    </td>
                    <td>${renderStars(rv.rating)}</td>
                    <td style="color:var(--softer);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escape((rv.body || rv.text || '').slice(0, 120))}</td>
                    <td style="color:var(--softer)">${escape(fmtDate(rv.created_at))}</td>
                    <td><span class="pill ${rv.approved ? 'live' : 'pending'}">${rv.approved ? 'Approved' : 'Pending'}</span></td>

                      <div style="display:flex;gap:6px;flex-wrap:nowrap">

                        ${rv.approved ? `<button class="btn ghost sm" data-rv-reject="${escape(rv.id)}">Reject</button>` : ''}

      b.addEventListener('click', () => { state.reviewsFilter = b.dataset.rflt; renderReviews(); })

      try {
        const r = await adminFetch('/api/admin/reviews', {

          headers: { 'Content-Type': 'application/json' },

    $$('button[data-rv-del]').forEach((b) =>
      b.addEventListener('click', () => deleteReview(b.dataset.rvDel))

  }).catch((err) => {
    if (err.message === 'unauthorized') return;
    $('#content').innerHTML = `<div class="empty"><strong>Could not load reviews</strong><br>${escape(err.message)}</div>`;
  });
};

const renderAnalyticsDonut = (items, colors) => {
  let acc = 0;
  const C = 80, R = 64, SW = 24;
  const total = items.reduce((s, it) => s + it.count, 0) || 1;
  const segs = items.map((it, idx) => {
    const frac = it.count / total;
    const start = acc; acc += frac;
    const ang0 = start * Math.PI * 2 - Math.PI / 2;
    const ang1 = (start + frac) * Math.PI * 2 - Math.PI / 2;
    const x0 = C + R * Math.cos(ang0), y0 = C + R * Math.sin(ang0);
    const x1 = C + R * Math.cos(ang1), y1 = C + R * Math.sin(ang1);
    const large = frac > 0.5 ? 1 : 0;
    return frac > 0
      ? `<path d="M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1}" stroke="${colors[idx % colors.length]}" stroke-width="${SW}" fill="none"/>`
      : '';
  }).join('');
  const legend = items.map((it, idx) => `
    <div class="row">
      <div><span class="swatch" style="background:${colors[idx % colors.length]}"></span>${escape(it.key)}</div>
      <div style="color:var(--soft)">${it.count} <span style="color:var(--softest)">(${Math.round((it.count / total) * 100)}%)</span></div>
    </div>
  `).join('');
  return `
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="${R}" stroke="var(--surface-3)" stroke-width="${SW}" fill="none"/>
        ${segs}
      </svg>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
};

const renderAnalyticsChart = (series) => {
  if (!series || series.length === 0) return '<div style="color:var(--softest);font-style:italic;padding:40px 0;text-align:center">No data</div>';
  const W = 800, H = 200, P = { l: 36, r: 16, t: 14, b: 26 };
  const w = W - P.l - P.r;
  const h = H - P.t - P.b;
  const maxV = Math.max(1, ...series.map((d) => d.views));
  const step = w / Math.max(1, series.length - 1);
  const pts = series.map((d, i) => [P.l + i * step, P.t + h - (d.views / maxV) * h]);
  const path = pts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x},${y}`).join(' ');
  const areaPath = `${path} L${P.l + w},${P.t + h} L${P.l},${P.t + h} Z`;

  // Sample x-axis ticks — pick ~5 evenly
  const tickCount = Math.min(5, series.length);
  const tickIdxs = Array.from({ length: tickCount }, (_, i) => Math.round((i / (tickCount - 1 || 1)) * (series.length - 1)));
  const xLabels = tickIdxs.map((idx) => {
    const [x] = pts[idx];
    const d = new Date(series[idx].date);
    return `<text class="tick" x="${x}" y="${H - 6}" text-anchor="middle">${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</text>`;
  }).join('');

  const yTicks = [0, Math.round(maxV / 2), maxV].map((v) => {
    const y = P.t + h - (v / maxV) * h;
    return `<g><line class="grid" x1="${P.l}" y1="${y}" x2="${P.l + w}" y2="${y}"/><text class="tick" x="${P.l - 6}" y="${y + 3}" text-anchor="end">${v}</text></g>`;
  }).join('');

  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="analyticsGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(164,202,232,0.28)"/>
          <stop offset="100%" stop-color="rgba(164,202,232,0)"/>
        </linearGradient>
      </defs>
      ${yTicks}
      <path d="${areaPath}" fill="url(#analyticsGrad)"/>
      <path d="${path}" fill="none" stroke="#a4cae8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${xLabels}
    </svg>
  `;
};

const renderAnalytics = () => {

    <h1>Analytics <small>Last ${days} days</small></h1>

  $$('.filterbtn[data-arng]').forEach((b) => b.addEventListener('click', () => {

    state.analyticsCache = null;
    renderAnalytics();
  }));

  // Loading state
  $('#content').innerHTML = `<div class="empty" style="padding:60px 0"><em>Loading analytics…</em></div>`;

  fetchAnalytics(days).then((data) => {
    state.analyticsCache = data;

    const { kpis, series, top_pages, top_referrers, top_countries, devices, utm, funnel } = data;

    if (kpis.page_views === 0) {
      $('#content').innerHTML = `
        <div class="empty">
          <strong>No data yet</strong>
          No analytics data yet. Page views will appear here as visitors browse the site.
        </div>
      `;
      return;
    }

    const fmtBounce = (v) => `${Math.round((v || 0) * 100)}%`;
    const fmtSession = (secs) => {
      const m = Math.floor((secs || 0) / 60);
      const s = Math.round((secs || 0) % 60);
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    };

    // Top pages / referrers bars
    const renderBarList = (items, label) => {
      if (!items || items.length === 0) return `<div class="empty" style="padding:20px 0">No data.</div>`;
      const maxC = Math.max(1, ...items.map((it) => it.count));
      return items.slice(0, 10).map((it) => `
        <div style="padding:10px 0;border-bottom:1px solid var(--line-2)">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="color:var(--soft);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%">${escape(it.key)}</span>
            <span style="color:var(--softer);font-size:12px;flex-shrink:0;margin-left:8px">${it.count}</span>
          </div>
          <div style="background:var(--surface-3);height:3px;border-radius:2px">
            <div style="background:var(--gold-2);height:3px;border-radius:2px;width:${Math.round((it.count / maxC) * 100)}%"></div>
          </div>
        </div>
      `).join('');
    };

    // Donut colors
    const COUNTRY_COLORS = ['#a4cae8', '#b5d39c', '#e2c373', '#d99a6c', '#c9a4e0', '#7acdc8'];
    const DEVICE_COLORS  = ['#d9b070', '#a4cae8', '#b5d39c', '#d99a6c'];

    // Normalise countries — group tail as Other
    const countryItems = (() => {
      const top6 = (top_countries || []).slice(0, 6);
      const otherCount = (top_countries || []).slice(6).reduce((s, it) => s + it.count, 0);
      return otherCount > 0 ? [...top6, { key: 'Other', count: otherCount }] : top6;
    })();

    // Funnel
    const funnelSteps = [
      { label: 'Visitors', count: funnel.visitors },
      { label: 'Product views', count: funnel.product_views },
      { label: 'Cart views', count: funnel.cart_views },
      { label: 'Orders', count: funnel.orders },
    ];
    const funnelMax = Math.max(1, funnelSteps[0].count);
    const funnelHtml = funnelSteps.map((step, i) => {
      const pct = Math.round((step.count / funnelMax) * 100);
      const convPct = i === 0 ? 100 : Math.round((step.count / funnelSteps[0].count) * 100);
      return `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="color:var(--soft);font-size:13px">${escape(step.label)}</span>
            <span style="color:var(--softer);font-size:12px">${step.count.toLocaleString()} <span style="color:var(--softest)">(${convPct}%)</span></span>
          </div>
          <div style="background:var(--surface-3);height:8px;border-radius:4px">
            <div style="background:linear-gradient(90deg,rgba(217,176,112,0.8),rgba(217,176,112,0.3));height:8px;border-radius:4px;width:${pct}%;transition:width 0.4s ease"></div>
          </div>
        </div>
      `;
    }).join('');

    // UTM section
    const utmHtml = (utm && utm.length > 0) ? `
      <div style="height:16px"></div>
      <div class="card">
        <div class="card-head"><h2>UTM campaigns</h2></div>
        <div class="card-body flush">
          <table class="t">
            <thead><tr><th>Source / Medium · Campaign</th><th style="text-align:right">Sessions</th></tr></thead>
            <tbody>
              ${utm.slice(0, 10).map((u) => `
                <tr class="no-hover">
                  <td style="color:var(--soft)">${escape(u.key)}</td>
                  <td style="text-align:right;color:#f5ecda;font-weight:500">${u.count}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    ` : '';

    $('#content').innerHTML = `
      <div class="stat-grid">
        <div class="stat">
          <div class="label">Page views</div>
          <div class="value">${kpis.page_views.toLocaleString()}</div>
          <div class="delta"><span style="color:var(--softest)">Last ${days} days</span></div>
        </div>
        <div class="stat">
          <div class="label">Unique visitors</div>
          <div class="value">${kpis.visitors.toLocaleString()}</div>
          <div class="delta"><span style="color:var(--softest)">Last ${days} days</span></div>
        </div>
        <div class="stat">
          <div class="label">Sessions</div>
          <div class="value">${kpis.sessions.toLocaleString()}</div>
          <div class="delta"><span style="color:var(--softest)">Last ${days} days</span></div>
        </div>
        <div class="stat">
          <div class="label">Bounce rate</div>
          <div class="value">${fmtBounce(kpis.bounce_rate)}</div>
          <div class="delta"><span style="color:var(--softest)">Avg session ${fmtSession(kpis.avg_session_seconds)}</span></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h2>Page views over time</h2></div>
        <div class="card-body">${renderAnalyticsChart(series)}</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="card">
          <div class="card-head"><h2>Top pages</h2></div>
          <div class="card-body">${renderBarList(top_pages, 'Views')}</div>
        </div>
        <div class="card">
          <div class="card-head"><h2>Top referrers</h2></div>
          <div class="card-body">${renderBarList(top_referrers, 'Sessions')}</div>

        <div class="card">
          <div class="card-head"><h2>Countries</h2></div>
          <div class="card-body">${countryItems.length ? renderAnalyticsDonut(countryItems, COUNTRY_COLORS) : '<div class="empty" style="padding:20px 0">No data.</div>'}</div>
        </div>
        <div class="card">
          <div class="card-head"><h2>Devices</h2></div>
          <div class="card-body">${devices && devices.length ? renderAnalyticsDonut(devices, DEVICE_COLORS) : '<div class="empty" style="padding:20px 0">No data.</div>'}</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h2>Conversion funnel</h2></div>
        <div class="card-body">${funnelHtml}</div>
      </div>

      ${utmHtml}
    `;
  }).catch((err) => {
    if (err.message === 'unauthorized') return;
    $('#content').innerHTML = `<div class="empty"><strong>Could not load analytics</strong>${escape(err.message)}</div>`;
  });

    b.addEventListener('click', () => { state.reportsRange = b.dataset.rng; render(); })
  );
  $('#exportOrdersCsv').addEventListener('click', exportOrdersCsv);

  // Revenue per month (last 12 months)
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i, 1);
    months.push({ key: d.toISOString().slice(0, 7), label: d.toLocaleDateString(undefined, { month: 'short' }), rev: 0 });
  }
  for (const o of orders) {
    const k = new Date(o.created_at).toISOString().slice(0, 7);
    const m = months.find((x) => x.key === k);
    if (m) m.rev += o.total_cents;
  }
  const maxMonthRev = Math.max(1, ...months.map((m) => m.rev));

  // Order status distribution
  const statusBuckets = ['pending', 'paid', 'fulfilled', 'refunded'].map((s) => ({
    label: s, count: Store.orders().filter((o) => o.status === s).length,
  }));
  const totalOrders = statusBuckets.reduce((sum, s) => sum + s.count, 0) || 1;
  const STATUS_COLORS = { pending: '#e2c373', paid: '#8db4d4', fulfilled: '#a3c08b', refunded: '#d99a6c' };

  // Donut math
  let acc = 0;
  const C = 80, R = 64, SW = 24;
  const segs = statusBuckets.map((s) => {
    const frac = s.count / totalOrders;
    const start = acc; acc += frac;
    const ang0 = start * Math.PI * 2 - Math.PI / 2;
    const ang1 = (start + frac) * Math.PI * 2 - Math.PI / 2;
    const x0 = C + R * Math.cos(ang0), y0 = C + R * Math.sin(ang0);
    const x1 = C + R * Math.cos(ang1), y1 = C + R * Math.sin(ang1);
    const large = frac > 0.5 ? 1 : 0;
    return frac > 0
      ? `<path d="M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1}" stroke="${STATUS_COLORS[s.label]}" stroke-width="${SW}" fill="none"/>`
      : '';
  }).join('');

  // Revenue by metal
  const byMetal = {};
  for (const o of within) {
    for (const it of o.items) {
      const p = Store.productById(it.product_id);
      const metal = p ? p.metal : 'Unknown';
      byMetal[metal] = (byMetal[metal] || 0) + it.price_cents * it.quantity;
    }
  }
  const metalRows = Object.entries(byMetal).sort((a, b) => b[1] - a[1]);

  // Top customers within range
  const customerSpend = {};
  for (const o of within) {
    customerSpend[o.customer_id] = (customerSpend[o.customer_id] || 0) + o.total_cents;
  }
  const topCustomers = Object.entries(customerSpend)
    .sort((a, b) => b[1] - a[1]).slice(0, 5)
    .map(([cid, total]) => {
      const c = Store.customerById(cid);
      return c ? { ...c, total } : null;
    }).filter(Boolean);

  $('#content').innerHTML = `
    <div class="grid-2">
      <div class="card">
        <div class="card-head"><h2>Revenue, last 12 months</h2></div>
        <div class="card-body">
          <div class="bars">
            ${months.map((m) => {
              const h = Math.round((m.rev / maxMonthRev) * 100);
              return `<div class="bar" style="height:${h}%;min-height:3px">
                <div class="v">${escape(fmtPrice(m.rev))}</div>
                <div class="lbl">${escape(m.label)}</div>
              </div>`;
            }).join('')}
          </div>
          <div style="height:24px"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Orders by status</h2></div>
        <div class="card-body">
          <div class="donut-wrap">
            <svg class="donut-svg" viewBox="0 0 160 160">
              <circle cx="80" cy="80" r="${R}" stroke="var(--surface-3)" stroke-width="${SW}" fill="none"/>
              ${segs}
            </svg>
            <div class="donut-legend">
              ${statusBuckets.map((s) => `
                <div class="row">
                  <div><span class="swatch" style="background:${STATUS_COLORS[s.label]}"></span><span style="text-transform:capitalize">${s.label}</span></div>
                  <div style="color:var(--soft)">${s.count} <span style="color:var(--softest)">(${Math.round((s.count / totalOrders) * 100)}%)</span></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-head"><h2>Revenue by metal</h2><div class="tools"><span class="pill">Last ${days}d</span></div></div>
        <div class="card-body flush">
          <table class="t">
            <thead><tr><th>Metal</th><th style="text-align:right">Revenue</th></tr></thead>
            <tbody>
              ${metalRows.length === 0
                ? '<tr class="no-hover"><td colspan="2"><div class="empty">No sales in this range.</div></td></tr>'
                : metalRows.map(([metal, rev]) => `
                  <tr class="no-hover">
                    <td>${escape(metal)}</td>
                    <td style="text-align:right;color:#f5ecda;font-weight:500">${escape(fmtPrice(rev))}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Top customers</h2><div class="tools"><span class="pill">Last ${days}d</span></div></div>
        <div class="card-body flush">
          <table class="t">
            <thead><tr><th>Customer</th><th style="text-align:right">Spent</th></tr></thead>
            <tbody>
              ${topCustomers.length === 0
                ? '<tr class="no-hover"><td colspan="2"><div class="empty">No data in this range.</div></td></tr>'
                : topCustomers.map((c) => `
                  <tr class="no-hover">
                    <td>${escape(c.name)}<br><small style="color:var(--softer)">${escape(c.email)}</small></td>
                    <td style="text-align:right;color:#f5ecda;font-weight:500">${escape(fmtPrice(c.total))}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
};

const exportOrdersCsv = () => {
  const rows = [['order', 'customer', 'email', 'total_gbp', 'status', 'created_at', 'items']];
  Store.orders().forEach((o) => {
    rows.push([
      o.number, o.customer_name, o.customer_email,
      (o.total_cents / 100).toFixed(2), o.status, o.created_at,
      o.items.map((i) => `${i.title} x${i.quantity}`).join(' | '),
    ]);
  });
  const csv = rows.map((r) => r.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `maliki-orders-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};
