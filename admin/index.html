<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maliki — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0a0908" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Italiana&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0908;
    --surface:   #131210;
    --surface-2: #1b1916;
    --surface-3: #232019;
    --line:      rgba(217, 176, 112, 0.16);
    --line-2:    rgba(245, 236, 218, 0.08);
    --soft:      rgba(245, 236, 218, 0.94);
    --softer:    rgba(245, 236, 218, 0.66);
    --softest:   rgba(245, 236, 218, 0.40);
    --gold-1:    #e8c488;
    --gold-2:    #b68a4e;
    --gold-3:    #8a6531;
    --gold-hi:   #f8e3b4;
    --danger:    #d99a6c;
    --danger-2:  #c46d3e;
    --ok:        #a3c08b;
    --warn:      #e2c373;
    --info:      #8db4d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--soft);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::selection { background: rgba(232, 196, 136, 0.32); color: #fff; }

  /* ---------- Login ---------- */
  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(217, 176, 112, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 90%, rgba(0, 0, 0, 0.4) 0%, transparent 70%),
      var(--bg);
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    border: 1px solid var(--line);
    background: var(--surface);
    padding: 40px 36px;
    text-align: center;
  }
  .login-card .mark {
    font-family: 'Italiana', serif;
    font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--softer); margin-bottom: 8px;
  }
  .login-card .logo {
    margin: 0 auto 14px;
  }
  .login-card .logo img {
    height: 64px; width: auto; display: block; margin: 0 auto;
  }
  .login-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 28px; color: #f5ecda; font-weight: 400; margin-bottom: 28px;
  }
  .login-card .field {
    border-bottom: 1px solid var(--line);
    margin-bottom: 22px;
    transition: border-color 0.4s ease;
  }
  .login-card .field:focus-within { border-color: rgba(217, 176, 112, 0.7); }
  .login-card input {
    width: 100%; background: transparent; border: 0; outline: 0;
    color: #f5ecda;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; letter-spacing: 0.2em; padding: 12px 4px; text-align: center;
  }
  .login-card input::placeholder { color: var(--softer); font-style: italic; }
  .login-card button {
    background: transparent; border: 1px solid rgba(217, 176, 112, 0.4);
    color: #f3d89e;
    font-family: 'Italiana', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 12px 24px; cursor: pointer;
    transition: color 0.4s ease, border-color 0.4s ease;
  }
  .login-card button:hover { color: var(--gold-hi); border-color: var(--gold-1); }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-card .err { margin-top: 14px; color: var(--danger); font-size: 12px; letter-spacing: 0.16em; min-height: 14px; }
  .login-card .hint {
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--softest); letter-spacing: 0.04em; line-height: 1.5;
  }

  /* ---------- App layout ---------- */
  .app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 16px;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 22px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 18px;
  }
  .brand img {
    height: 56px; width: auto; display: block;
  }
  .brand .mt {
    font-family: 'Italiana', serif;
    font-size: 9px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--softer);
    margin-top: 4px;
  }
  .navlink {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 6px;
    color: var(--softer);
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
    border: 0; background: transparent; width: 100%; text-align: left;
  }
  .navlink:hover { background: var(--surface-2); color: var(--soft); }
  .navlink.active { background: var(--surface-3); color: var(--gold-1); }
  .navlink .icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }
  .navlink .badge {
    margin-left: auto;
    background: var(--surface-3);
    color: var(--softer);
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 100px; letter-spacing: 0.04em;
  }
  .navlink.active .badge { background: rgba(217, 176, 112, 0.16); color: var(--gold-1); }
  .nav-divider { height: 1px; background: var(--line-2); margin: 14px 8px; }
  .navgroup {
    font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--softest); padding: 14px 14px 6px; font-weight: 600;
  }
  .sidebar .foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line-2); }
  .sidebar .foot .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; gap: 8px; }
  .sidebar .foot .who { font-size: 11px; color: var(--softer); }
  .sidebar .foot .who strong { color: var(--soft); display: block; font-weight: 500; font-size: 13px; }
  .iconbtn {
    background: transparent; border: 1px solid var(--line);
    color: var(--softer); padding: 6px 9px;
    font-size: 11px; letter-spacing: 0.06em; cursor: pointer; border-radius: 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .iconbtn:hover { color: var(--soft); border-color: rgba(217, 176, 112, 0.4); }

  .main {
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: 24px; color: #f5ecda;
  }
  .topbar h1 small {
    color: var(--softest); font-size: 13px; margin-left: 12px; font-style: normal;
    letter-spacing: 0.06em;
  }
  .topbar .actions { display: flex; gap: 10px; align-items: center; }

  .content { padding: 26px 28px 60px; max-width: 1320px; }

  /* ---------- Buttons / shared controls ---------- */
  .btn {
    background: linear-gradient(180deg, #d9b070 0%, #b68a4e 100%);
    border: 0; color: #1a120a; font-weight: 600;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer; border-radius: 4px;
    transition: filter 0.2s, transform 0.2s;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; border: 1px solid var(--line); color: var(--softer); font-weight: 500;
  }
  .btn.ghost:hover { color: var(--soft); border-color: rgba(217, 176, 112, 0.4); }
  .btn.danger {
    background: transparent; border: 1px solid rgba(217, 154, 108, 0.4); color: var(--danger); font-weight: 500;
  }
  .btn.danger:hover { color: var(--danger-2); border-color: rgba(217, 154, 108, 0.7); }
  .btn.sm { padding: 7px 13px; font-size: 11px; letter-spacing: 0.12em; }

  .input, .select, .textarea {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--soft);
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 4px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s ease;
  }
  .input:focus, .select:focus, .textarea:focus { border-color: rgba(217, 176, 112, 0.6); }
  .input::placeholder, .textarea::placeholder { color: var(--softest); }
  .textarea { min-height: 96px; resize: vertical; line-height: 1.5; }

  /* ---------- Stat cards ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 1100px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .stat .label {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--softest); margin-bottom: 8px;
  }
  .stat .value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 400; color: #f5ecda;
    line-height: 1.1;
  }
  .stat .delta {
    margin-top: 8px;
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--softer);
    display: flex; align-items: center; gap: 6px;
  }
  .stat .delta .up { color: var(--ok); }
  .stat .delta .down { color: var(--danger); }

  /* ---------- Cards / sections ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line-2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: 19px; color: #f5ecda;
  }
  .card-head .tools { display: flex; gap: 8px; align-items: center; }
  .card-body { padding: 18px 20px; }
  .card-body.flush { padding: 0; }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ---------- Sales chart ---------- */
  .chart {
    width: 100%; height: 220px;
    display: block;
  }
  .chart .area { fill: url(#areaGrad); }
  .chart .line { fill: none; stroke: #d9b070; stroke-width: 2; }
  .chart .grid { stroke: var(--line-2); stroke-width: 1; }
  .chart .tick { fill: var(--softest); font-size: 10px; letter-spacing: 0.04em; }
  .chart .dot { fill: #f8e3b4; }

  /* ---------- Tables ---------- */
  table.t {
    width: 100%; border-collapse: collapse;
  }
  table.t th, table.t td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--line-2);
    vertical-align: middle;
  }
  table.t th {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--softest); font-weight: 500;
    background: var(--surface);
    position: sticky; top: 0;
  }
  table.t td { color: var(--soft); font-size: 13px; }
  table.t tbody tr { cursor: pointer; transition: background 0.15s ease; }
  table.t tbody tr:hover { background: var(--surface-2); }
  table.t tbody tr.no-hover { cursor: default; background: transparent; }

  .thumb {
    width: 44px; height: 44px;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.empty { color: var(--softest); font-size: 9px; letter-spacing: 0.2em; }
  .cell-product { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .cell-product .meta { min-width: 0; }
  .cell-product .meta .t { color: #f5ecda; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .cell-product .meta .s { color: var(--softer); font-size: 11px; letter-spacing: 0.06em; }

  .pill {
    display: inline-block;
    padding: 3px 10px;
    border: 1px solid var(--line);
    border-radius: 100px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--softer); white-space: nowrap;
  }
  .pill.live { color: var(--ok); border-color: rgba(163, 192, 139, 0.35); }
  .pill.draft { color: var(--softest); }
  .pill.pending { color: var(--warn); border-color: rgba(226, 195, 115, 0.35); }
  .pill.paid { color: var(--info); border-color: rgba(141, 180, 212, 0.35); }
  .pill.fulfilled { color: var(--ok); border-color: rgba(163, 192, 139, 0.35); }
  .pill.refunded { color: var(--danger); border-color: rgba(217, 154, 108, 0.35); }
  .pill.featured { color: var(--gold-1); border-color: rgba(217, 176, 112, 0.35); }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .toolbar .left { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar .input { width: 280px; }

  .filterbtn {
    background: transparent; border: 1px solid var(--line);
    color: var(--softer); font-size: 12px; letter-spacing: 0.04em;
    padding: 8px 14px; border-radius: 4px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .filterbtn:hover { color: var(--soft); }
  .filterbtn.active { color: var(--gold-1); border-color: rgba(217, 176, 112, 0.5); background: rgba(217, 176, 112, 0.06); }

  /* ---------- Activity / lists ---------- */
  .list-item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 4px 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-2);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .list-item:hover { background: var(--surface-2); }
  .list-item:last-child { border-bottom: 0; }
  .list-item .who { color: #f5ecda; font-weight: 500; }
  .list-item .who small { color: var(--softer); font-weight: 400; margin-left: 6px; font-size: 12px; }
  .list-item .right { text-align: right; }
  .list-item .right .amt { color: #f5ecda; font-weight: 500; }
  .list-item .right .when { color: var(--softest); font-size: 11px; letter-spacing: 0.08em; }
  .list-item .what { grid-column: 1 / -1; color: var(--softer); font-size: 12px; }

  /* ---------- Drawer ---------- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 50;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh;
    width: min(640px, 100%);
    background: var(--surface);
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.2,.7,.2,1);
    z-index: 60;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line-2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .drawer header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400; font-size: 22px; color: #f5ecda;
  }
  .drawer .body { padding: 22px 24px 100px; overflow-y: auto; flex: 1; }
  .drawer footer {
    padding: 14px 24px;
    border-top: 1px solid var(--line-2);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: var(--surface);
  }
  .drawer footer .feedback { flex: 1; font-size: 12px; color: var(--softer); }
  .drawer footer .feedback.error { color: var(--danger); }
  .drawer footer .feedback.ok { color: var(--ok); }

  /* ---------- Form ---------- */
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .form-row.split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row.split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-row > label, .form-row > .lbl {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--softest);
  }
  .form-row .hint { font-size: 11px; color: var(--softest); }
  .checkbox {
    display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .checkbox input { width: 16px; height: 16px; accent-color: #d9b070; }
  .checkbox span {
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--soft);
  }

  /* ---------- Image dropzone ---------- */
  .dropzone {
    border: 1.5px dashed var(--line);
    background: rgba(255,255,255,0.015);
    border-radius: 6px;
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .dropzone:hover, .dropzone.over {
    border-color: rgba(217, 176, 112, 0.55);
    background: rgba(217, 176, 112, 0.04);
  }
  .dropzone .dz-title {
    font-size: 13px; color: var(--soft); letter-spacing: 0.04em; margin-bottom: 4px;
  }
  .dropzone .dz-sub { font-size: 11px; color: var(--softest); letter-spacing: 0.04em; }
  .img-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px;
  }
  .img-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--surface-3);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    overflow: hidden;
  }
  .img-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-tile .rm {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(10, 9, 8, 0.85); color: var(--soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 12px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .img-tile .rm:hover { color: var(--danger); border-color: rgba(217, 154, 108, 0.5); }
  .img-tile .cover-tag {
    position: absolute; bottom: 4px; left: 4px;
    background: rgba(217, 176, 112, 0.92); color: #1a120a;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
    padding: 2px 6px; border-radius: 2px;
  }

  /* ---------- Order detail / customer detail ---------- */
  .detail-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 18px;
  }
  .detail-meta .label {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--softest);
    margin-bottom: 4px;
  }
  .detail-meta .value { color: var(--soft); font-size: 14px; }
  .detail-meta .value.lg { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #f5ecda; font-style: italic; }

  .line-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .line-item:last-child { border-bottom: 0; }
  .line-item .info { flex: 1; }
  .line-item .info .t { color: #f5ecda; font-weight: 500; }
  .line-item .info .s { color: var(--softer); font-size: 11px; letter-spacing: 0.06em; }
  .line-item .qty { color: var(--softer); font-size: 13px; padding: 0 12px; }
  .line-item .amt { color: #f5ecda; font-weight: 500; }

  .totals { padding-top: 12px; }
  .totals .row {
    display: flex; justify-content: space-between; padding: 6px 0;
    font-size: 13px; color: var(--soft);
  }
  .totals .row.total {
    border-top: 1px solid var(--line-2);
    margin-top: 6px;
    padding-top: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #f5ecda;
  }

  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--softest); font-style: italic;
  }
  .empty strong {
    display: block; font-style: normal;
    font-family: 'Italiana', serif;
    font-size: 14px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--soft); margin-bottom: 12px;
  }

  /* ---------- Sub-tabs (within a section) ---------- */
  .subtabs {
    display: flex; gap: 4px; margin-bottom: 16px;

  .tpl-card {
    border: 1px solid var(--line);

    border-radius: 6px;

  .tpl-card .key {
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;

  .tpl-card .stats { display: flex; gap: 14px; font-size: 11px; color: var(--softest); letter-spacing: 0.06em; }

<script>
'use strict';

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

const escape = (s) =>
  String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
  );

const fmtPrice = (cents, currency) => {
  try {
    return new Intl.NumberFormat('en-GB', {
      style: 'currency', currency: currency || 'GBP', maximumFractionDigits: 0,
    }).format((cents || 0) / 100);
  } catch { return `£${((cents || 0) / 100).toFixed(0)}`; }
};

const fmtDate = (iso, opts = { dateStyle: 'medium' }) => {
  try { return new Date(iso).toLocaleString(undefined, opts); } catch { return iso; }
};

const fmtRel = (iso) => {
  const ms = new Date(iso).getTime() - Date.now();
  const min = Math.round(ms / 60000);
  const fmt = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  if (Math.abs(min) < 60) return fmt.format(min, 'minute');
  const hr = Math.round(min / 60);
  if (Math.abs(hr) < 24) return fmt.format(hr, 'hour');
  const d = Math.round(hr / 24);
  return fmt.format(d, 'day');
};

const slugify = (s) =>
  String(s || '').toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80);

const toast = (msg, kind = 'ok') => {
  const t = document.createElement('div');
  t.className = `toast ${kind}`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2600);
};

// Tiny inline icons (16x16). Stroke uses currentColor.

    settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3 1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8 1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/>',
    shop: '<path d="M5 4h14l-1 4H6zM5 8h14v11H5z"/><path d="M9 11v3M15 11v3"/>',
    out: '<path d="M14 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4M10 17l-5-5 5-5M5 12h11"/>',
  };
  return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${paths[name] || ''}</svg>`;
};

// ---------- Overview ----------
const computeStats = () => {
  const orders = Store.orders().filter((o) => o.status !== 'refunded');
  const now = Date.now();
  const within = (iso, days) => (now - new Date(iso).getTime()) <= days * 86400000;
  const between = (iso, from, to) => {
    const t = new Date(iso).getTime();
    return now - t >= from * 86400000 && now - t < to * 86400000;
  };

  const last30 = orders.filter((o) => within(o.created_at, 30));
  const prev30 = orders.filter((o) => between(o.created_at, 30, 60));

  const sum = (arr) => arr.reduce((s, o) => s + o.total_cents, 0);
  const rev = sum(last30);
  const prevRev = sum(prev30);
  const aov = last30.length ? Math.round(rev / last30.length) : 0;
  const prevAov = prev30.length ? Math.round(prevRev / prev30.length) : 0;

  const pct = (a, b) => {
    if (b === 0) return a === 0 ? 0 : 100;
    return Math.round(((a - b) / b) * 100);
  };

  return {
    revenue: rev, revDelta: pct(rev, prevRev),
    orders: last30.length, ordDelta: pct(last30.length, prev30.length),
    customers: Store.customers().length,
    aov, aovDelta: pct(aov, prevAov),
    seriesByDay: (() => {
      const buckets = new Array(30).fill(0);
      for (const o of last30) {
        const day = Math.floor((now - new Date(o.created_at).getTime()) / 86400000);
        if (day >= 0 && day < 30) buckets[29 - day] += o.total_cents;
      }
      return buckets;
    })(),
  };
};

const renderChart = (series) => {
  const W = 800, H = 220, P = { l: 36, r: 16, t: 16, b: 26 };
  const w = W - P.l - P.r;
  const h = H - P.t - P.b;
  const max = Math.max(1, ...series);
  const xStep = w / (series.length - 1);
  const pts = series.map((v, i) => [P.l + i * xStep, P.t + h - (v / max) * h]);
  const path = pts.map(([x, y], i) => (i === 0 ? `M${x},${y}` : `L${x},${y}`)).join(' ');
  const areaPath = `${path} L${P.l + w},${P.t + h} L${P.l},${P.t + h} Z`;
  const ticks = [0, max / 2, max].map((v, i) => {
    const y = P.t + h - (v / max) * h;
    return `<g><line class="grid" x1="${P.l}" y1="${y}" x2="${P.l + w}" y2="${y}"/><text class="tick" x="${P.l - 6}" y="${y + 3}" text-anchor="end">${fmtPrice(v)}</text></g>`;
  }).join('');
  const xLabels = [29, 22, 15, 8, 1].map((daysBack) => {
    const d = new Date(Date.now() - daysBack * 86400000);
    const i = 29 - daysBack;
    const x = P.l + i * xStep;
    return `<text class="tick" x="${x}" y="${H - 6}" text-anchor="middle">${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</text>`;
  }).join('');

  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(217,176,112,0.32)"/>
          <stop offset="100%" stop-color="rgba(217,176,112,0)"/>
        </linearGradient>
      </defs>
      ${ticks}
      <path class="area" d="${areaPath}"/>
      <path class="line" d="${path}"/>
      ${xLabels}
    </svg>
  `;
};

const topProductsByRevenue = (n = 5) => {
  const orders = Store.orders().filter((o) => o.status !== 'refunded');
  const map = new Map();
  for (const o of orders) {
    for (const it of o.items) {
      const cur = map.get(it.product_id) || { id: it.product_id, title: it.title, image: it.image, units: 0, revenue: 0 };
      cur.units += it.quantity;
      cur.revenue += it.price_cents * it.quantity;
      map.set(it.product_id, cur);
    }
  }
  return Array.from(map.values()).sort((a, b) => b.revenue - a.revenue).slice(0, n);
};

const renderOverview = () => {
  $('#topbar').innerHTML = `
    <h1>Overview <small>${new Date().toLocaleDateString(undefined, { dateStyle: 'long' })}</small></h1>
    <div class="actions">
      <button class="btn ghost sm" id="resetData">Reset demo data</button>
    </div>
  `;
  $('#resetData').addEventListener('click', () => {
    if (confirm('Reset products, customers, orders and cart back to the seed data?')) {
      Store.reset(); toast('Demo data reset');
    }
  });

  const s = computeStats();
  const recent = Store.orders().slice(0, 6);
  const top = topProductsByRevenue(5);

  const deltaTag = (n) => {
    if (!Number.isFinite(n) || n === 0) return `<span style="color:var(--softest)">— vs prior 30d</span>`;
    if (n > 0) return `<span class="up">▲ ${n}%</span> <span style="color:var(--softest)">vs prior 30d</span>`;
    return `<span class="down">▼ ${Math.abs(n)}%</span> <span style="color:var(--softest)">vs prior 30d</span>`;
  };

  $('#content').innerHTML = `
    <div class="stat-grid">
      <div class="stat">
        <div class="label">Revenue (30d)</div>
        <div class="value">${fmtPrice(s.revenue)}</div>

      <div class="form-row" style="margin:0">
        <label for="f-slug">URL slug</label>

        <label for="f-stock">Stock</label>

        <label for="f-metal">Metal</label>

const renderDraftImages = () => {
  const grid = $('#imgGrid');
  if (!grid) return;
  grid.innerHTML = state.draftImages.map((src, i) => `
    <div class="img-tile">
      <img src="${escape(src)}" alt="">
      ${i === 0 ? '<div class="cover-tag">Cover</div>' : ''}
      <button class="rm" data-i="${i}" title="Remove">×</button>
    </div>
  `).join('');
  grid.querySelectorAll('.rm').forEach((b) =>
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const i = Number(b.dataset.i);
      state.draftImages.splice(i, 1);
      renderDraftImages();
    })
  );
};

const handleFiles = async (fileList) => {
  const files = Array.from(fileList || []);
  const remaining = 8 - state.draftImages.length;
  if (remaining <= 0) { toast('Up to 8 images per product', 'err'); return; }
  for (const f of files.slice(0, remaining)) {
    try {
      const dataUrl = await ImageUpload.resizeToJpeg(f);
      state.draftImages.push(dataUrl);
      renderDraftImages();
    } catch (e) {
      toast(`Couldn't read ${f.name}`, 'err');
    }
  }
};

const collectProductForm = () => {
  const priceUnits = Number($('#f-price').value);
  const stockRaw = $('#f-stock').value.trim();
  return {
    title: $('#f-title').value.trim(),
    subtitle: $('#f-subtitle').value.trim(),
    slug: slugify($('#f-slug').value),
    currency: ($('#f-currency').value || 'GBP').toUpperCase().slice(0, 3),
    price_cents: Number.isFinite(priceUnits) ? Math.round(priceUnits * 100) : 0,
    stock: stockRaw === '' ? null : Math.max(0, Math.floor(Number(stockRaw) || 0)),
    metal: $('#f-metal').value.trim(),
    stone: $('#f-stone').value.trim(),
    hand_size: $('#f-size').value.trim(),
    description: $('#f-desc').value,
    images: state.draftImages,
    published: $('#f-pub').checked,
    featured: $('#f-feat').checked,
  };
};

const saveProduct = () => {
  const fb = $('#prodFeedback');
  fb.className = 'feedback';
  const data = collectProductForm();
  if (!data.title) { fb.textContent = 'Title is required.'; fb.className = 'feedback error'; return; }
  if (!data.slug)  { fb.textContent = 'Slug is required.';  fb.className = 'feedback error'; return; }

  try {
    if (state.editing === 'new') {
      Store.addProduct(data);
      toast('Product created');
    } else {
      Store.updateProduct(state.editing, data);
      toast('Product updated');
    }
    closeDrawer();
  } catch (e) {
    fb.textContent = e.message || 'Save failed.';
    fb.className = 'feedback error';
  }
};

const deleteProductFromDrawer = (id) => {
  const p = Store.productById(id);
  if (!p) return;
  if (!confirm(`Delete "${p.title}"? This can't be undone (until you reset the demo).`)) return;
  Store.deleteProduct(id);
  toast('Product deleted');
  closeDrawer();
};

      </div>

      </div>
      <div class="left"><span class="pill">${filtered.length} shown</span></div>
    </div>

    <div class="card">
      <div class="card-body flush">
        <table class="t">
          <thead><tr><th>Email</th><th>Source</th><th>Status</th><th>Subscribed</th><th></th></tr></thead>
          <tbody>
            ${filtered.length === 0

                  <td><span class="pill">${escape(s.source)}</span></td>
                  <td><span class="pill ${s.status === 'subscribed' ? 'live' : 'draft'}">${escape(s.status)}</span></td>
                  <td style="color:var(--softer)">${escape(fmtDate(s.subscribed_at))}</td>
                  <td>
                    <div class="actions" style="display:flex;gap:6px;justify-content:flex-end">
                      ${s.status === 'subscribed'
                        ? `<button class="btn ghost sm" data-act="unsub">Unsubscribe</button>`
                        : `<button class="btn ghost sm" data-act="resub">Re-subscribe</button>`}

const exportSubscribersCsv = () => {
  const rows = [['email', 'source', 'status', 'subscribed_at']];
  Store.subscribers().forEach((s) => rows.push([s.email, s.source, s.status, s.subscribed_at]));
  const csv = rows.map((r) => r.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `maliki-subscribers-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

const renderReports = () => {
  const orders = Store.orders().filter((o) => o.status !== 'refunded');
  const days = Number(state.reportsRange);
  const within = orders.filter((o) => (Date.now() - new Date(o.created_at).getTime()) < days * 86400000);

  $('#topbar').innerHTML = `
    <h1>Reports <small>Last ${days} days</small></h1>
    <div class="actions">
      ${[30, 90, 180, 365].map((d) =>
        `<button class="filterbtn ${Number(state.reportsRange) === d ? 'active' : ''}" data-rng="${d}">${d}d</button>`
      ).join('')}
      <button class="btn ghost sm" id="exportOrdersCsv">Export orders CSV</button>
    </div>
  `;
  $$('.filterbtn[data-rng]').forEach((b) =>
    b.addEventListener('click', () => { state.reportsRange = b.dataset.rng; render(); })
  );
  $('#exportOrdersCsv').addEventListener('click', exportOrdersCsv);

  // Revenue per month (last 12 months)
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i, 1);
    months.push({ key: d.toISOString().slice(0, 7), label: d.toLocaleDateString(undefined, { month: 'short' }), rev: 0 });
  }
  for (const o of orders) {
    const k = new Date(o.created_at).toISOString().slice(0, 7);
    const m = months.find((x) => x.key === k);
    if (m) m.rev += o.total_cents;
  }
  const maxMonthRev = Math.max(1, ...months.map((m) => m.rev));

  // Order status distribution
  const statusBuckets = ['pending', 'paid', 'fulfilled', 'refunded'].map((s) => ({
    label: s, count: Store.orders().filter((o) => o.status === s).length,
  }));
  const totalOrders = statusBuckets.reduce((sum, s) => sum + s.count, 0) || 1;
  const STATUS_COLORS = { pending: '#e2c373', paid: '#8db4d4', fulfilled: '#a3c08b', refunded: '#d99a6c' };

  // Donut math
  let acc = 0;
  const C = 80, R = 64, SW = 24;
  const segs = statusBuckets.map((s) => {
    const frac = s.count / totalOrders;
    const start = acc; acc += frac;
    const ang0 = start * Math.PI * 2 - Math.PI / 2;
    const ang1 = (start + frac) * Math.PI * 2 - Math.PI / 2;
    const x0 = C + R * Math.cos(ang0), y0 = C + R * Math.sin(ang0);
    const x1 = C + R * Math.cos(ang1), y1 = C + R * Math.sin(ang1);
    const large = frac > 0.5 ? 1 : 0;
    return frac > 0
      ? `<path d="M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1}" stroke="${STATUS_COLORS[s.label]}" stroke-width="${SW}" fill="none"/>`
      : '';
  }).join('');

  // Revenue by metal
  const byMetal = {};
  for (const o of within) {
    for (const it of o.items) {
      const p = Store.productById(it.product_id);
      const metal = p ? p.metal : 'Unknown';
      byMetal[metal] = (byMetal[metal] || 0) + it.price_cents * it.quantity;
    }
  }
  const metalRows = Object.entries(byMetal).sort((a, b) => b[1] - a[1]);

  // Top customers within range
  const customerSpend = {};
  for (const o of within) {
    customerSpend[o.customer_id] = (customerSpend[o.customer_id] || 0) + o.total_cents;
  }
  const topCustomers = Object.entries(customerSpend)
    .sort((a, b) => b[1] - a[1]).slice(0, 5)
    .map(([cid, total]) => {
      const c = Store.customerById(cid);
      return c ? { ...c, total } : null;
    }).filter(Boolean);

  $('#content').innerHTML = `
    <div class="grid-2">
      <div class="card">
        <div class="card-head"><h2>Revenue, last 12 months</h2></div>
        <div class="card-body">
          <div class="bars">
            ${months.map((m) => {
              const h = Math.round((m.rev / maxMonthRev) * 100);
              return `<div class="bar" style="height:${h}%;min-height:3px">
                <div class="v">${escape(fmtPrice(m.rev))}</div>
                <div class="lbl">${escape(m.label)}</div>
              </div>`;
            }).join('')}
          </div>
          <div style="height:24px"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Orders by status</h2></div>
        <div class="card-body">
          <div class="donut-wrap">
            <svg class="donut-svg" viewBox="0 0 160 160">
              <circle cx="80" cy="80" r="${R}" stroke="var(--surface-3)" stroke-width="${SW}" fill="none"/>
              ${segs}
            </svg>
            <div class="donut-legend">
              ${statusBuckets.map((s) => `
                <div class="row">
                  <div><span class="swatch" style="background:${STATUS_COLORS[s.label]}"></span><span style="text-transform:capitalize">${s.label}</span></div>
                  <div style="color:var(--soft)">${s.count} <span style="color:var(--softest)">(${Math.round((s.count / totalOrders) * 100)}%)</span></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-head"><h2>Revenue by metal</h2><div class="tools"><span class="pill">Last ${days}d</span></div></div>
        <div class="card-body flush">
          <table class="t">
            <thead><tr><th>Metal</th><th style="text-align:right">Revenue</th></tr></thead>
            <tbody>
              ${metalRows.length === 0
                ? '<tr class="no-hover"><td colspan="2"><div class="empty">No sales in this range.</div></td></tr>'
                : metalRows.map(([metal, rev]) => `
                  <tr class="no-hover">
                    <td>${escape(metal)}</td>
                    <td style="text-align:right;color:#f5ecda;font-weight:500">${escape(fmtPrice(rev))}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>Top customers</h2><div class="tools"><span class="pill">Last ${days}d</span></div></div>
        <div class="card-body flush">
          <table class="t">
            <thead><tr><th>Customer</th><th style="text-align:right">Spent</th></tr></thead>
            <tbody>
              ${topCustomers.length === 0
                ? '<tr class="no-hover"><td colspan="2"><div class="empty">No data in this range.</div></td></tr>'
                : topCustomers.map((c) => `
                  <tr class="no-hover">
                    <td>${escape(c.name)}<br><small style="color:var(--softer)">${escape(c.email)}</small></td>
                    <td style="text-align:right;color:#f5ecda;font-weight:500">${escape(fmtPrice(c.total))}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
};

const exportOrdersCsv = () => {
  const rows = [['order', 'customer', 'email', 'total_gbp', 'status', 'created_at', 'items']];
  Store.orders().forEach((o) => {
    rows.push([
      o.number, o.customer_name, o.customer_email,
      (o.total_cents / 100).toFixed(2), o.status, o.created_at,
      o.items.map((i) => `${i.title} x${i.quantity}`).join(' | '),
    ]);
  });
  const csv = rows.map((r) => r.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `maliki-orders-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

// ====================================================================
// Content (CMS pages)
// ====================================================================
const renderContent = () => {
  const list = Store.pages();

  $('#topbar').innerHTML = `
    <h1>Content <small>${list.length} pages</small></h1>
    <div class="actions"><button class="btn" id="newPage">+ New page</button></div>
  `;
  $('#newPage').addEventListener('click', () => openPageDrawer(null));

  $('#content').innerHTML = `
    <div class="card">
      <div class="card-body flush">
        <table class="t">
          <thead><tr><th>Title</th><th>URL</th><th>Status</th><th>Updated</th></tr></thead>
          <tbody>
            ${list.length === 0
              ? '<tr class="no-hover"><td colspan="4"><div class="empty">No pages yet.</div></td></tr>'
              : list.map((p) => `
                <tr data-pgid="${escape(p.id)}">
                  <td><strong style="color:#f5ecda">${escape(p.title)}</strong></td>
                  <td><code style="color:var(--softer);font-size:12px">/pages/${escape(p.slug)}</code></td>
                  <td><span class="pill ${p.status === 'published' ? 'live' : 'draft'}">${escape(p.status)}</span></td>
                  <td style="color:var(--softer)">${escape(fmtRel(p.updated_at))}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  $$('tr[data-pgid]').forEach((tr) => tr.addEventListener('click', () => openPageDrawer(tr.dataset.pgid)));
};

const openPageDrawer = (id) => {
  const p = id ? Store.pageById(id) : null;
  state.editing = p ? p.id : 'new-page';

  $('#drawerTitle').textContent = p ? `Page · ${p.title}` : 'New page';
  $('#drawerFoot').innerHTML = `
    <div class="feedback" id="pgFb"></div>
    ${p ? '<button class="btn danger" id="pgDelete">Delete</button>' : ''}
    <button class="btn ghost" id="pgCancel">Cancel</button>
    <button class="btn" id="pgSave">${p ? 'Save' : 'Create'}</button>
  `;
  $('#drawerBody').innerHTML = `
    <div class="form-row">
      <label for="pg-title">Title</label>
      <input class="input" id="pg-title" value="${escape(p?.title || '')}" autofocus />
    </div>
    <div class="form-row">
      <label for="pg-slug">URL slug</label>
      <input class="input" id="pg-slug" value="${escape(p?.slug || '')}" />
      <div class="hint">/pages/<span id="pgSlugPreview">${escape(p?.slug || '…')}</span></div>
    </div>
    <div class="form-row">
      <label for="pg-body">Body</label>
      <textarea class="textarea" id="pg-body" rows="14" style="font-family:Georgia,serif">${escape(p?.body || '')}</textarea>
    </div>
    <div class="form-row">
      <label for="pg-status">Status</label>
      <select class="select" id="pg-status">
        <option value="published" ${(p?.status || 'published') === 'published' ? 'selected' : ''}>Published</option>
        <option value="draft" ${p?.status === 'draft' ? 'selected' : ''}>Draft</option>
      </select>
    </div>
  `;

  let slugTouched = !!p?.slug;
  $('#pg-title').addEventListener('input', (e) => {
    if (!slugTouched) {
      const s = slugify(e.target.value);
      $('#pg-slug').value = s; $('#pgSlugPreview').textContent = s || '…';
    }
  });
  $('#pg-slug').addEventListener('input', () => {
    slugTouched = true;
    $('#pgSlugPreview').textContent = slugify($('#pg-slug').value) || '…';
  });

  $('#pgCancel').addEventListener('click', closeDrawer);
  $('#pgSave').addEventListener('click', () => {
    const fb = $('#pgFb');
    const data = {
      title: $('#pg-title').value.trim(),
      slug: slugify($('#pg-slug').value),
      body: $('#pg-body').value,
      status: $('#pg-status').value,
    };
    if (!data.title) { fb.textContent = 'Title is required.'; fb.className = 'feedback error'; return; }
    if (!data.slug) { fb.textContent = 'Slug is required.'; fb.className = 'feedback error'; return; }
    try {
      if (p) Store.updatePage(p.id, data); else Store.addPage(data);
      toast(p ? 'Page saved' : 'Page created');
      closeDrawer();
    } catch (e) { fb.textContent = 'Save failed.'; fb.className = 'feedback error'; }
  });
  if (p) $('#pgDelete').addEventListener('click', () => {
    if (confirm(`Delete "${p.title}"?`)) { Store.deletePage(p.id); toast('Deleted'); closeDrawer(); }
  });

  $('#backdrop').classList.add('open');
  $('#drawer').classList.add('open');
};

// ====================================================================
// Settings
// ====================================================================
const renderSettings = () => {
  $('#topbar').innerHTML = `<h1>Settings</h1>`;
  const s = Store.settings();
  const tabs = [
    ['general', 'General'],
    ['branding', 'Branding'],
    ['integrations', 'Integrations'],
    ['notifications', 'Notifications'],
    ['shipping', 'Shipping'],
    ['legal', 'Legal'],
  ];

  $('#content').innerHTML = `
    <div class="settings-layout">
      <nav class="settings-nav">
        ${tabs.map(([k, lbl]) => `<button class="${state.settingsTab === k ? 'active' : ''}" data-st="${k}">${escape(lbl)}</button>`).join('')}
      </nav>
      <div class="settings-section" id="settingsBody"></div>
    </div>
  `;
  $$('.settings-nav button').forEach((b) =>
    b.addEventListener('click', () => { state.settingsTab = b.dataset.st; render(); })
  );

  const body = $('#settingsBody');

  const saveBar = (sectionKey, gather) => {
    const id = `save_${sectionKey}`;
    const html = `<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn" id="${id}">Save changes</button></div>`;
    setTimeout(() => {
      const btn = document.getElementById(id);
      if (btn) btn.addEventListener('click', () => {
        Store.updateSettings(sectionKey, gather());
        toast('Saved');
      });
    }, 0);
    return html;
  };

  if (state.settingsTab === 'general') {
    const g = s.general || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Store</h2></div>
        <div class="card-body">
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Store name</label><input class="input" id="sg-name" value="${escape(g.store_name || '')}"/></div>
            <div class="form-row" style="margin:0"><label>Contact email</label><input class="input" id="sg-email" value="${escape(g.store_email || '')}"/></div>
          </div>
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Default currency</label><input class="input" id="sg-currency" value="${escape(g.currency || 'GBP')}" maxlength="3"/></div>
            <div class="form-row" style="margin:0"><label>Timezone</label><input class="input" id="sg-tz" value="${escape(g.timezone || '')}"/></div>
          </div>
          <div class="form-row"><label>Atelier address</label><textarea class="textarea" id="sg-addr" rows="3">${escape(g.address || '')}</textarea></div>
          ${saveBar('general', () => ({
            store_name: $('#sg-name').value.trim(),
            store_email: $('#sg-email').value.trim(),
            currency: ($('#sg-currency').value || 'GBP').toUpperCase().slice(0, 3),
            timezone: $('#sg-tz').value.trim(),
            address: $('#sg-addr').value.trim(),
          }))}
        </div>
      </div>
    `;
  } else if (state.settingsTab === 'branding') {
    const b = s.branding || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Brand</h2></div>
        <div class="card-body">
          <div class="form-row split-2">
            <div class="form-row" style="margin:0"><label>Wordmark text</label><input class="input" id="sb-logo" value="${escape(b.logo_text || 'Maliki')}"/></div>
            <div class="form-row" style="margin:0"><label>Accent colour</label><input class="input" id="sb-color" type="color" value="${escape(b.accent_color || '#d9b070')}" style="height:42px;padding:4px"/></div>
          </div>
          <div class="form-row">
            <div class="lbl">Preview</div>
            <div style="background:var(--bg);border:1px solid var(--line);padding:32px;text-align:center;border-radius:6px">
              <div style="font-family:'Pinyon Script',serif;font-size:64px;color:${escape(b.accent_color || '#d9b070')};line-height:1">${escape(b.logo_text || 'Maliki')}</div>
              <div style="font-family:'Italiana',serif;font-size:11px;letter-spacing:0.42em;color:var(--softer);margin-top:6px">Atelier</div>
            </div>
          </div>
          ${saveBar('branding', () => ({
            logo_text: $('#sb-logo').value.trim() || 'Maliki',
            accent_color: $('#sb-color').value,
          }))}
        </div>
      </div>
    `;
  } else if (state.settingsTab === 'integrations') {
    const ints = s.integrations || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Integrations</h2></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          ${Object.entries(ints).map(([key, cfg]) => `
            <div class="integration-card">
              <div class="info">
                <div class="name">${escape(cfg.label || key)}</div>
                <div class="meta">${cfg.connected ? '<span style="color:var(--ok)">● Connected</span>' : '<span style="color:var(--softest)">○ Not connected</span>'}</div>
              </div>
              <button class="btn ghost sm" data-int="${escape(key)}">${cfg.connected ? 'Disconnect' : 'Connect'}</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    $$('button[data-int]').forEach((b) => b.addEventListener('click', () => {
      const key = b.dataset.int;
      const cur = (Store.settings().integrations || {})[key] || {};
      const nextInts = { ...(Store.settings().integrations || {}) };
      nextInts[key] = { ...cur, connected: !cur.connected };
      Store.updateSettings('integrations', nextInts);
      toast(`${cur.connected ? 'Disconnected' : 'Connected'}`);

  } else if (state.settingsTab === 'notifications') {
    const n = s.notifications || {};
    const ITEMS = [
      ['new_order', 'A new order is placed'],
      ['cancelled_order', 'An order is refunded or cancelled'],
      ['new_subscriber', 'A new subscriber joins the list'],
      ['low_stock', 'A product is low on stock'],
      ['weekly_summary', 'Weekly summary digest'],

    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Email me when…</h2></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          ${ITEMS.map(([k, lbl]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line-2)">

              <label class="switch"><input type="checkbox" data-nk="${k}" ${n[k] ? 'checked' : ''}/><span class="slider"></span></label>

        </div>
      </div>
    `;
    $$('input[data-nk]').forEach((cb) => cb.addEventListener('change', () => {
      const k = cb.dataset.nk;
      const next = { ...(Store.settings().notifications || {}), [k]: cb.checked };
      Store.updateSettings('notifications', next);
      toast('Saved');

  } else if (state.settingsTab === 'shipping') {
    const sh = s.shipping || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Shipping</h2></div>
        <div class="card-body">

            <div class="form-row" style="margin:0"><label>Flat rate</label><input class="input" id="ss-flat" type="number" min="0" step="1" value="${(sh.flat_rate_cents || 0) / 100}"/><div class="hint">£0 = included.</div></div>
            <div class="form-row" style="margin:0"><label>Free over</label><input class="input" id="ss-free" type="number" min="0" step="1" value="${(sh.free_threshold_cents || 0) / 100}"/></div>
          </div>
          <div class="form-row"><label>Countries serviced</label><textarea class="textarea" id="ss-c" rows="3">${escape(sh.countries_serviced || '')}</textarea></div>
          <div class="form-row"><label>Courier</label><input class="input" id="ss-cr" value="${escape(sh.courier || '')}"/></div>
          ${saveBar('shipping', () => ({
            flat_rate_cents: Math.max(0, Math.round(Number($('#ss-flat').value || 0) * 100)),
            free_threshold_cents: Math.max(0, Math.round(Number($('#ss-free').value || 0) * 100)),
            countries_serviced: $('#ss-c').value.trim(),
            courier: $('#ss-cr').value.trim(),
          }))}
        </div>
      </div>
    `;
  } else if (state.settingsTab === 'legal') {
    const l = s.legal || {};
    body.innerHTML = `
      <div class="card"><div class="card-head"><h2>Legal</h2></div>
        <div class="card-body">
          <div class="form-row"><label>Terms URL</label><input class="input" id="sl-t" value="${escape(l.terms_url || '')}"/></div>
          <div class="form-row"><label>Privacy URL</label><input class="input" id="sl-p" value="${escape(l.privacy_url || '')}"/></div>
          <div class="form-row"><label>Company number</label><input class="input" id="sl-cn" value="${escape(l.company_number || '')}"/></div>
          ${saveBar('legal', () => ({
            terms_url: $('#sl-t').value.trim(),
            privacy_url: $('#sl-p').value.trim(),
            company_number: $('#sl-cn').value.trim(),
          }))}
        </div>
      </div>
    `;
  }
};

// ---------- Drawer plumbing ----------
const closeDrawer = () => {
  $('#backdrop').classList.remove('open');
  $('#drawer').classList.remove('open');
  state.editing = null;
  state.draftImages = [];
};

// ---------- Auth bootstrap ----------
const logout = async () => {
  try { await fetch('/api/admin/logout', { method: 'POST' }); } catch {}
  state.authed = false;
  renderLogin();
};

(async () => {
  try {
    const r = await fetch('/api/admin/session');
    const { authed } = await r.json();
    if (!authed) return renderLogin();
    state.authed = true;
    renderApp();
  } catch {
    renderLogin('Could not reach the server.');
  }
})();
</script>
