<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maliki Atelier</title>
<meta name="description" content="A piece from the Maliki Atelier ring collection." />
<meta name="theme-color" content="#0a0908" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Italiana&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  :root {
    --black: #0a0908;
    --charcoal: #141311;
    --soft: rgba(245, 236, 218, 0.92);
    --softer: rgba(245, 236, 218, 0.62);
    --gold-1: #e8c488;
    --gold-2: #b68a4e;
    --gold-highlight: #f8e3b4;
    --line: rgba(217, 176, 112, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--black);
    color: var(--soft);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(20px, 3.6vh, 36px) clamp(20px, 5vw, 56px);
    border-bottom: 1px solid var(--line);
  }
  .wordmark {
    font-family: 'Pinyon Script', serif;
    font-size: clamp(28px, 3.4vw, 38px);
    color: #d9b070;
    line-height: 1;
  }
  .nav {
    display: flex;
    gap: clamp(20px, 3vw, 36px);
    font-family: 'Italiana', serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--softer);
  }
  .nav a:hover { color: var(--gold-highlight); }

  .crumbs {
    padding: 22px clamp(20px, 5vw, 56px) 0;
    font-family: 'Italiana', serif;
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--softer);
  }
  .crumbs a:hover { color: var(--gold-highlight); }

  .product {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: clamp(28px, 5vw, 80px);
    padding: clamp(28px, 6vh, 64px) clamp(20px, 5vw, 56px) clamp(60px, 10vh, 120px);
    max-width: 1280px;
    margin: 0 auto;
    align-items: start;
  }
  @media (max-width: 880px) { .product { grid-template-columns: 1fr; } }

  .gallery { display: flex; flex-direction: column; gap: 18px; }
  .main-img {
    aspect-ratio: 1 / 1;
    background: var(--charcoal);
    border: 1px solid var(--line);
    overflow: hidden;
    position: relative;
  }
  .main-img img {
    width: 100%; height: 100%; object-fit: cover;
    filter: saturate(0.95);
  }
  .main-img.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--softer);
    font-family: 'Italiana', serif;
    font-size: 12px; letter-spacing: 0.4em; text-transform: uppercase;
  }
  .thumbs { display: flex; gap: 10px; flex-wrap: wrap; }
  .thumbs button {
    width: 64px; height: 64px;
    background: var(--charcoal);
    border: 1px solid var(--line);
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.4s ease;
  }
  .thumbs button.active { border-color: var(--gold-1); }
  .thumbs button img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .info { display: flex; flex-direction: column; gap: 22px; }
  .info .eyebrow {
    font-family: 'Italiana', serif;
    font-size: 11px;
    letter-spacing: 0.62em;
    text-transform: uppercase;
    color: var(--softer);
  }
  .info h1 {
    font-family: 'Italiana', serif;
    font-size: clamp(28px, 3.6vw, 44px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #f5ecda;
    font-weight: 400;
  }
  .info .price {
    font-style: italic;
    font-size: clamp(18px, 1.8vw, 22px);
    letter-spacing: 0.14em;
    color: #f3d89e;
  }
  .rule {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217, 176, 112, 0.55), transparent);
  }
  .info .desc {
    color: var(--soft);
    line-height: 1.75;
    font-size: 16px;
    letter-spacing: 0.04em;
    white-space: pre-wrap;
  }
  .stock {
    font-family: 'Italiana', serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--softer);
  }

  /* Inquiry form */
  .inquire {
    margin-top: 14px;
    border-top: 1px solid var(--line);
    padding-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .inquire .label {
    font-family: 'Italiana', serif;
    font-size: 12px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--soft);
  }
  .inquire .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 520px) { .inquire .row { grid-template-columns: 1fr; } }

  .field {
    position: relative;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    transition: border-color 0.6s ease;
  }
  .field:focus-within { border-color: rgba(217, 176, 112, 0.7); }
  .field input,
  .field textarea {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    padding: 12px 2px;
    color: #f5ecda;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.18em;
    resize: vertical;
  }
  .field textarea { min-height: 96px; padding-top: 14px; }
  .field input::placeholder,
  .field textarea::placeholder {
    color: var(--softer);
    font-style: italic;
    letter-spacing: 0.22em;
  }

  .submit {
    align-self: flex-start;
    background: transparent;
    border: 1px solid rgba(217, 176, 112, 0.4);
    color: #f3d89e;
    font-family: 'Italiana', serif;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    padding: 14px 28px;
    cursor: pointer;
    transition: color 0.4s ease, border-color 0.4s ease, letter-spacing 0.4s ease;
  }
  .submit:hover {
    color: var(--gold-highlight);
    border-color: var(--gold-1);
    letter-spacing: 0.5em;
  }
  .submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .feedback {
    min-height: 16px;
    font-family: 'Italiana', serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(217, 176, 112, 0.9);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .feedback.visible { opacity: 1; }
  .feedback.error { color: #d99a6c; }

  .loading, .notfound {
    text-align: center;
    padding: 120px 20px;
    color: var(--softer);
    font-style: italic;
    letter-spacing: 0.14em;
  }
  .notfound a {
    color: var(--gold-1);
    border-bottom: 1px solid var(--line);
  }

  .footer {
    border-top: 1px solid var(--line);
    padding: 24px clamp(20px, 5vw, 56px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Italiana', serif;
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--softer);
  }
</style>
</head>
<body>
  <header class="topbar">
    <a href="/" class="wordmark" aria-label="Maliki Atelier home">Maliki</a>
    <nav class="nav">
      <a href="/shop">The Rings</a>
    </nav>
  </header>

  <nav class="crumbs"><a href="/shop">The Rings</a> <span style="margin:0 10px;color:var(--line)">/</span> <span id="crumb-title">…</span></nav>

  <main id="root">
    <div class="loading">Loading…</div>
  </main>

  <footer class="footer">
    <span>© Maliki Atelier</span>
    <span>By Appointment</span>
  </footer>

  <script>
    const EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const fmtPrice = (cents, currency) => {
      try {
        return new Intl.NumberFormat(undefined, {
          style: 'currency',
          currency: currency || 'GBP',
          maximumFractionDigits: 0,
        }).format((cents || 0) / 100);
      } catch {
        return `${((cents || 0) / 100).toFixed(0)} ${currency || ''}`.trim();
      }
    };
    const escape = (s) =>
      String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
      );

    const slug = new URLSearchParams(location.search).get('slug');
    const root = document.getElementById('root');
    const crumbTitle = document.getElementById('crumb-title');

    const renderNotFound = () => {
      crumbTitle.textContent = 'Not found';
      root.innerHTML = `
        <div class="notfound">
          This piece is no longer available.<br/><br/>
          <a href="/shop">Return to the collection</a>
        </div>
      `;
    };

    const stockLine = (p) => {
      if (p.stock === null || p.stock === undefined) return '';
      if (p.stock <= 0) return '<div class="stock">Reserved · Awaiting next piece</div>';
      if (p.stock === 1) return '<div class="stock">One piece available</div>';
      if (p.stock <= 3) return `<div class="stock">${p.stock} pieces available</div>`;
      return '';
    };

    const renderProduct = (p) => {
      crumbTitle.textContent = p.title;
      document.title = `${p.title} — Maliki Atelier`;

      const images = (p.images || []).filter(Boolean);
      const main = images[0]
        ? `<div class="main-img"><img id="mainImg" src="${escape(images[0])}" alt="${escape(p.title)}"></div>`
        : `<div class="main-img empty">No Image</div>`;
      const thumbs = images.length > 1
        ? `<div class="thumbs">
             ${images.map((src, i) => `
               <button type="button" data-src="${escape(src)}" class="${i === 0 ? 'active' : ''}">
                 <img src="${escape(src)}" alt="">
               </button>
             `).join('')}
           </div>`
        : '';

      root.innerHTML = `
        <article class="product">
          <div class="gallery">
            ${main}
            ${thumbs}
          </div>
          <div class="info">
            <div class="eyebrow">The Rings</div>
            <h1>${escape(p.title)}</h1>
            <div class="price">${escape(fmtPrice(p.price_cents, p.currency))}</div>
            <div class="rule"></div>
            <div class="desc">${escape(p.description || '')}</div>
            ${stockLine(p)}

            <form class="inquire" id="inquireForm" novalidate>
              <div class="label">Request to Acquire</div>
              <div class="row">
                <label class="field">
                  <input id="inqName" type="text" autocomplete="name" placeholder="Your Name" />
                </label>
                <label class="field">
                  <input id="inqEmail" type="email" autocomplete="email" placeholder="Your Email" required />
                </label>
              </div>
              <label class="field">
                <textarea id="inqMessage" placeholder="A note for the atelier (optional)"></textarea>
              </label>
              <button class="submit" type="submit" id="inqSubmit">Send Request</button>
              <div class="feedback" id="inqFeedback" role="status" aria-live="polite"></div>
            </form>
          </div>
        </article>
      `;

      const mainImg = document.getElementById('mainImg');
      document.querySelectorAll('.thumbs button').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (mainImg) mainImg.src = btn.dataset.src;
          document.querySelectorAll('.thumbs button').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      const form = document.getElementById('inquireForm');
      const feedback = document.getElementById('inqFeedback');
      const submit = document.getElementById('inqSubmit');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('inqEmail').value.trim();
        if (!EMAIL_RX.test(email)) {
          feedback.textContent = 'Please enter a valid email.';
          feedback.classList.add('visible', 'error');
          return;
        }
        submit.disabled = true;
        submit.textContent = 'Sending';
        feedback.classList.remove('visible', 'error');
        try {
          const res = await fetch('/api/inquiries', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              product_id: p.id,
              email,
              name: document.getElementById('inqName').value.trim(),
              message: document.getElementById('inqMessage').value.trim(),
            }),
          });
          if (!res.ok) throw new Error('failed');
          feedback.textContent = 'Thank you — the atelier will be in touch shortly.';
          feedback.classList.add('visible');
          form.querySelectorAll('input, textarea, button').forEach((el) => (el.disabled = true));
        } catch (err) {
          submit.disabled = false;
          submit.textContent = 'Send Request';
          feedback.textContent = 'Something went wrong. Please try again.';
          feedback.classList.add('visible', 'error');
        }
      });
    };

    (async () => {
      if (!slug) return renderNotFound();
      try {
        const res = await fetch(`/api/products?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error('fetch');
        const { products } = await res.json();
        const p = (products || [])[0];
        if (!p) return renderNotFound();
        renderProduct(p);
      } catch (e) {
        renderNotFound();
      }
    })();
  </script>
</body>
</html>
