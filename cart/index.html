<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cart — Maliki Atelier</title>

<link rel="canonical" href="https://www.malikiatelier.com/cart/" />

<meta property="og:image" content="https://www.malikiatelier.com/og.jpg" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:wght@400;500;600;700&family=Allura&display=swap" rel="stylesheet" />
<style>
  :root {
    --black: #0a0908;
    --bg-warm: #0f0d0a;
    --bg-rich: #161210;
    --bg-loft: #1d1813;
    --bg-deep: #07060a;
    --charcoal: #141311;
    --soft: rgba(245, 236, 218, 0.98);
    --softer: rgba(245, 236, 218, 0.86);
    --softest: rgba(245, 236, 218, 0.78);
    --gold-1: #e8c488;
    --gold-2: #b68a4e;
    --gold-hi: #f8e3b4;
    --line: rgba(217, 176, 112, 0.36);
    --ok: #a3c08b;
    --danger: #d99a6c;
  }
  .skip-link { position:absolute; top:-40px; left:8px; background:#d9b070; color:#0a0908; padding:8px 14px; border-radius:0; z-index:100; font-family:'Playfair Display',serif; letter-spacing:0.18em; text-transform:uppercase; font-size:11px; transition:top .15s ease; }
  .skip-link:focus { top:8px; outline:2px solid #f8e3b4; outline-offset:2px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg-warm); color: var(--soft);
    font-family: 'Lora', serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(20px, 3.6vh, 36px) clamp(20px, 5vw, 56px);
    border-bottom: 1px solid var(--line);
  }
  .wordmark {
    display: inline-flex;
    align-items: center;
    line-height: 0;
  }
  .wordmark img {
    height: clamp(64px, 6vw, 96px);
    width: auto;
    display: block;
  }
  .nav {
    display: flex; gap: clamp(20px, 3vw, 36px); align-items: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; color: #f5ecda;
  }
  .nav a:hover { color: var(--gold-hi); }
  .burger {
    display: none; flex-direction: column; justify-content: space-between;
    width: 24px; height: 18px; background: transparent; border: none;
    cursor: pointer; padding: 0;
  }
  .burger span { display: block; height: 1.5px; width: 100%; background: var(--soft); }
  .mobile-nav {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(10, 9, 8, 0.98);
    flex-direction: column; justify-content: center; align-items: center; gap: 36px;
    font-family: 'Playfair Display', serif;
    font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; color: #f5ecda;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a { transition: color 0.2s; }
  .mobile-nav a:hover { color: var(--gold-hi); }
  .mobile-nav-close {
    position: absolute; top: clamp(16px, 3vh, 28px); right: clamp(20px, 5vw, 56px);
    background: transparent; border: none; color: var(--softer);
    font-size: 20px; cursor: pointer; padding: 8px; line-height: 1;
  }
  .mobile-nav-close:hover { color: var(--gold-hi); }
  @media (max-width: 768px) { .nav { display: none; } .burger { display: flex; } }

  .hero {
    text-align: center;
    padding: clamp(40px, 7vh, 80px) 24px clamp(28px, 5vh, 48px);
    background:
      radial-gradient(ellipse 70% 120% at 50% -10%, rgba(190, 140, 65, 0.06) 0%, transparent 60%),
      var(--black);
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.62em; text-indent: 0.62em;
    text-transform: uppercase; color: var(--softer);
    display: inline-block; padding-bottom: 14px;
  }
  .h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 5vw, 56px); letter-spacing: 0.18em;
    text-transform: uppercase; color: #f5ecda;
  }
  .h1 em {
    font-family: 'Playfair Display', serif;
    font-style: normal; color: #d9b070;
    font-size: 1em; letter-spacing: 0.18em; text-transform: uppercase;
    margin: 0 0 0 0.3em;
  }

  .layout {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: clamp(28px, 4vw, 64px);
    padding: 0 clamp(20px, 5vw, 56px) clamp(60px, 10vh, 120px);
    max-width: 1200px;
    margin: 0 auto;
    align-items: start;
  }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    border: 1px solid var(--line);
    background: rgba(30, 24, 18, 0.72);
  }
  .panel header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
  }
  .panel header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 14px; letter-spacing: 0.42em; text-transform: uppercase; color: #f5ecda; font-weight: 400;
  }
  .panel .body { padding: 6px 22px; }

  /* ---------- Line items ---------- */
  .line {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    gap: 18px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .line:last-child { border-bottom: 0; }
  .line .img {
    aspect-ratio: 1 / 1;
    background: var(--bg-loft);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .line .img img { width: 100%; height: 100%; object-fit: cover; }
  .line .info .title {
    font-family: 'Playfair Display', serif;
    font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase; color: #f5ecda;
    margin-bottom: 4px;
  }
  .line .info .subtitle {
    color: var(--softer); font-style: italic; font-size: 14px; letter-spacing: 0.04em;
  }
  .line .info .controls {
    margin-top: 12px;
    display: flex; gap: 16px; align-items: center;
  }
  .qty {
    display: inline-flex; align-items: center;
    border: 1px solid var(--line); border-radius: 4px;
  }
  .qty button {
    background: transparent; border: 0; color: var(--soft);
    width: 32px; height: 36px; font-size: 16px;
  }
  .qty button:hover { color: var(--gold-hi); }
  .qty span { min-width: 28px; text-align: center; font-style: italic; }
  .remove {
    background: transparent; border: 0; color: var(--softer);
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    transition: color 0.3s ease;
  }
  .remove:hover { color: var(--danger); }
  .line .price {
    font-style: italic; color: #f3d89e; letter-spacing: 0.12em; font-size: 16px; text-align: right; min-width: 100px;
  }

  /* ---------- Empty ---------- */
  .empty {
    text-align: center; padding: 80px 20px;
  }
  .empty h3 {
    font-family: 'Lora', serif;
    font-style: italic; font-weight: 400; font-size: 22px; color: #f5ecda;
    margin-bottom: 14px;
  }
  .empty p { color: var(--softer); font-style: italic; letter-spacing: 0.06em; margin-bottom: 28px; }
  .empty .cta {
    display: inline-block;
    background: linear-gradient(180deg, #d9b070 0%, #b68a4e 100%);
    color: #1a120a; font-weight: 600;
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 13px 26px; border-radius: 4px;
  }

  /* ---------- Summary / checkout ---------- */
  .summary .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 0; color: var(--soft); font-size: 15px;
  }
  .summary .row .lbl { color: var(--softer); letter-spacing: 0.06em; }
  .summary .row.total {
    border-top: 1px solid var(--line);
    padding-top: 16px; margin-top: 6px;
  }
  .summary .row.total .lbl {
    font-family: 'Playfair Display', serif; font-size: 12px;
    letter-spacing: 0.42em; text-transform: uppercase; color: var(--soft);
  }
  .summary .row.total .val {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 28px; color: #f5ecda;
  }

  .form { padding: 20px 0 0; display: flex; flex-direction: column; gap: 14px; }
  .form .lbl {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--soft);
    margin-bottom: 8px;
  }
  .form .field {
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line);
    transition: border-color 0.4s ease;
  }
  .form .field:focus-within { border-color: rgba(217, 176, 112, 0.7); }
  .form .field input, .form .field select {
    flex: 1;
    background: transparent; border: 0; outline: 0;
    color: #f5ecda;
    font-family: 'Lora', serif;
    font-size: 15px; letter-spacing: 0.16em;
    padding: 12px 2px;
  }
  .form .field input::placeholder {
    color: var(--softer); font-style: italic; letter-spacing: 0.18em;
  }
  .form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  .discount-toggle {
    background: none; border: 0; padding: 0;
    color: var(--softer);
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase;
    cursor: pointer; transition: color 0.3s;
    margin-top: 4px;
  }
  .discount-toggle:hover { color: var(--gold-hi); }
  .discount-box { margin-top: 10px; display: none; }
  .discount-box.open { display: block; }
  .discount-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
  .apply-btn {
    background: transparent;
    border: 1px solid rgba(217,176,112,0.4);
    color: var(--gold-1);
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase;
    padding: 11px 14px; cursor: pointer; white-space: nowrap;
    transition: border-color 0.3s, color 0.3s;
  }
  .apply-btn:hover { border-color: rgba(217,176,112,0.8); color: var(--gold-hi); }
  .apply-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .discount-msg {
    min-height: 14px; margin-top: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.38em; text-transform: uppercase;
  }
  .discount-msg.ok { color: var(--ok); }
  .discount-msg.err { color: var(--danger); }

  /* ---------- Gift wrap & newsletter checkboxes ---------- */
  .cart-check-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 4px 0;
  }
  .cart-check {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .cart-check input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    border: 1px solid rgba(217, 176, 112, 0.5);
    background: transparent;
    margin-top: 2px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.25s, background 0.25s;
  }
  .cart-check input[type="checkbox"]:checked {
    background: rgba(217, 176, 112, 0.18);
    border-color: rgba(217, 176, 112, 0.9);
  }
  .cart-check input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 4px;
    width: 5px;
    height: 9px;
    border: 1.5px solid #d9b070;
    border-top: 0;
    border-left: 0;
    transform: rotate(45deg);
  }
  .cart-check input[type="checkbox"]:focus-visible {
    outline: 2px solid #f8e3b4;
    outline-offset: 2px;
  }
  .cart-check-text {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--softer);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }
  .cart-check-text strong {
    color: var(--gold-1);
    font-weight: 400;
  }
  .gift-message-wrap {
    display: none;
    margin-top: 2px;
  }
  .gift-message-wrap.open { display: block; }
  .gift-message-wrap textarea {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--line);
    color: #f5ecda;
    font-family: 'Lora', serif;
    font-size: 14px;
    letter-spacing: 0.06em;
    font-style: italic;
    padding: 10px 2px;
    resize: none;
    outline: 0;
    transition: border-color 0.4s ease;
    line-height: 1.55;
  }
  .gift-message-wrap textarea::placeholder {
    color: var(--softer);
    font-style: italic;
    letter-spacing: 0.14em;
  }
  .gift-message-wrap textarea:focus { border-color: rgba(217, 176, 112, 0.7); }
  .gift-message-count {
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 0.26em;
    color: var(--softest);
    margin-top: 4px;
  }

  /* ---------- Referral banner ---------- */
  .referral-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(217, 176, 112, 0.07);
    border: 1px solid rgba(217, 176, 112, 0.22);
    margin-bottom: 6px;
  }
  .referral-banner-icon {
    color: var(--gold-1);
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .referral-banner-text {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--gold-1);
    letter-spacing: 0.04em;
    line-height: 1.55;
  }
  .referral-banner-text strong {
    font-style: normal;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold-hi);
  }

  .place {
    margin-top: 10px;
    background: linear-gradient(180deg, #d9b070 0%, #b68a4e 100%);
    border: 0; color: #1a120a; font-weight: 600;
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    padding: 16px 26px; border-radius: 4px;
    transition: filter 0.3s ease;
  }
  .place:hover { filter: brightness(1.06); }
  .place:disabled { opacity: 0.5; cursor: not-allowed; }
  .feedback {
    min-height: 14px;
    margin-top: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--danger); opacity: 0; transition: opacity 0.3s ease;
  }
  .feedback.show { opacity: 1; }

  .legal {
    margin-top: 16px;
    font-size: 12px; color: var(--softest); letter-spacing: 0.04em; line-height: 1.6; font-style: italic; text-align: center;
  }

  /* ---------- Stripe element host ---------- */
  #payment-element {
    margin: 20px 0 10px;
  }
  .back-link {
    display: inline-block; margin-top: 14px;
    background: none; border: 0; padding: 0;
    color: var(--softer);
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase;
    cursor: pointer; transition: color 0.3s;
  }
  .back-link:hover { color: var(--gold-hi); }

  /* ---------- Confirmation ---------- */
  .confirm {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 30px;
    border: 1px solid var(--line);
    background: rgba(20, 19, 17, 0.5);
  }
  .confirm .seal {
    font-family: 'Allura', cursive;
    color: #d9b070; font-size: 64px; line-height: 1;
    margin-bottom: 12px;
  }
  .confirm h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; letter-spacing: 0.42em; text-transform: uppercase; color: #f5ecda; font-weight: 400;
    margin-bottom: 12px;
  }
  .confirm p {
    color: var(--soft); font-style: italic; font-size: 17px; line-height: 1.6;
    max-width: 520px; margin: 0 auto 18px;
  }
  .confirm .order {
    display: inline-block;
    margin: 22px auto 8px;
    padding: 8px 22px;
    border: 1px solid var(--line);
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--gold-1);
  }
  .confirm .back {
    display: inline-block; margin-top: 24px;
    color: var(--softer);
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    border-bottom: 1px solid var(--line); padding-bottom: 4px;
  }
  .confirm .back:hover { color: var(--gold-hi); }

  .footer {
    border-top: 1px solid var(--line);
    padding: 24px clamp(20px, 5vw, 56px);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--softer);
  }

  :focus { outline: none; }
  :focus-visible { outline: 2px solid #f8e3b4; outline-offset: 2px; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid #f8e3b4; outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
  <header class="topbar">
    <a href="/" class="wordmark" aria-label="Maliki Atelier home"><img src="/assets/maliki-logo.svg" alt="Maliki Atelier"></a>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/shop">Shop</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/account">Account</a>
    </nav>
    <button class="burger" id="burgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-nav" id="mobileNav" role="dialog" aria-label="Navigation" aria-hidden="true">
    <button class="mobile-nav-close" id="mobileNavClose" aria-label="Close menu">✕</button>
    <a href="/">Home</a>
    <a href="/shop">Shop</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/account">Account</a>
    <a href="/cart">Cart</a>
  </div>

  <section class="hero" id="main">
    <div class="eyebrow">Atelier</div>
    <h1 class="h1">Your <em>Cart</em></h1>
  </section>

  <main id="root" class="layout"></main>

  <footer class="footer">
    <span>© Maliki Atelier</span>
    <span>White-Glove Courier · Insured Worldwide</span>
  </footer>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="/assets/ring-svg.js"></script>
  <script src="/assets/mock-data.js"></script>
  <script src="/assets/store.js"></script>
  <script src="/assets/supabase-sync.js"></script>
  <script>
    // ── Referral code: capture from URL on page load ──────────────────────────
    (function () {
      const refCode = new URLSearchParams(location.search).get('ref');
      if (refCode) sessionStorage.setItem('maliki.referral', refCode);
    })();

    const fmtPrice = (cents, currency) => {
      try { return new Intl.NumberFormat('en-GB', { style: 'currency', currency: currency || 'GBP', maximumFractionDigits: 0 }).format((cents || 0) / 100); }
      catch { return `£${((cents || 0) / 100).toFixed(0)}`; }
    };
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const COUNTRIES = ['United Kingdom','Ireland','France','Italy','Spain','Germany','Switzerland','Austria','Netherlands','Belgium','Sweden','Norway','Denmark','Greece','Portugal','United States','Canada','Australia','New Zealand','Singapore','Japan','South Korea','Hong Kong','UAE','Nigeria','South Africa'];

    const root = document.getElementById('root');
    let stripeInstance = null;
    let stripeElements = null;
    let pendingOrder = null;
    let savedDetails = {};
    let appliedDiscount = null;
    let accountSession = null; // { token, email } if signed in

    // ── Checkout extras state ─────────────────────────────────────────────────
    let giftWrap = false;
    let giftMessage = '';
    let newsletterOptIn = true;

    async function getValidToken() {
      const token   = localStorage.getItem('maliki.auth_token');
      const refresh = localStorage.getItem('maliki.auth_refresh');
      const expires = parseInt(localStorage.getItem('maliki.auth_expires') || '0', 10);
      if (!token) return null;
      if (expires > Date.now() + 60000) return token;
      if (!refresh) { ['maliki.auth_token','maliki.auth_refresh','maliki.auth_expires','maliki.auth_user'].forEach(k=>localStorage.removeItem(k)); return null; }
      try {
        const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST',
          headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refresh }),
        });
        if (!r.ok) { ['maliki.auth_token','maliki.auth_refresh','maliki.auth_expires','maliki.auth_user'].forEach(k=>localStorage.removeItem(k)); return null; }
        const d = await r.json();
        const exp = Date.now() + (d.expires_in || 3600) * 1000;
        localStorage.setItem('maliki.auth_token',   d.access_token);
        localStorage.setItem('maliki.auth_refresh', d.refresh_token);
        localStorage.setItem('maliki.auth_expires', String(exp));
        if (d.user) localStorage.setItem('maliki.auth_user', JSON.stringify(d.user));
        return d.access_token;
      } catch { return null; }
    }

<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(20,19,17,0.97);border-top:1px solid rgba(217,176,112,0.28);padding:16px clamp(20px,5vw,56px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:Lora,serif;font-size:13px;color:rgba(245,236,218,0.86)"><span>We use cookies to improve your experience. <a href="/page/?slug=privacy" style="color:#d9b070;text-underline-offset:3px;text-decoration:underline">Privacy policy</a></span><div style="display:flex;gap:10px;flex-shrink:0"><button onclick="setCookies(true)" style="background:linear-gradient(180deg,#d9b070,#b68a4e);border:0;color:#1a120a;font-family:Playfair Display,serif;font-size:10px;letter-spacing:0.38em;text-transform:uppercase;padding:9px 18px;cursor:pointer">Accept</button><button onclick="setCookies(false)" style="background:transparent;border:1px solid rgba(217,176,112,0.3);color:rgba(245,236,218,0.62);font-family:Playfair Display,serif;font-size:10px;letter-spacing:0.38em;text-transform:uppercase;padding:9px 18px;cursor:pointer">Decline</button></div></div><script>(function(){var b=document.getElementById("cookie-banner");if(!localStorage.getItem("maliki.cookies")&&b){b.style.display="flex";}window.setCookies=function(v){localStorage.setItem("maliki.cookies",v?"accepted":"declined");if(b)b.style.display="none";}})()</script>
<script>
  (function(){
    var burger = document.getElementById('burgerBtn');
    var nav = document.getElementById('mobileNav');
    var closeBtn = document.getElementById('mobileNavClose');
    if (!burger || !nav) return;
    function openNav() { nav.classList.add('open'); burger.setAttribute('aria-expanded','true'); nav.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
    function closeNav() { nav.classList.remove('open'); burger.setAttribute('aria-expanded','false'); nav.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
    burger.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    nav.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeNav); });
    document.addEventListener('click', function(e) { if (nav.classList.contains('open') && !nav.contains(e.target) && !burger.contains(e.target)) closeNav(); });
  })();
</script>
