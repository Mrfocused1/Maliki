<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maliki Atelier — Coming Soon</title>
<meta name="description" content="Maliki Atelier — a new standard of craftsmanship is arriving." />
<meta name="theme-color" content="#0a0908" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0908'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='42' font-style='italic' text-anchor='middle' fill='%23d9b070'%3EM%3C/text%3E%3C/svg%3E" />

<meta property="og:type" content="website" />
<meta property="og:site_name" content="Maliki Atelier" />
<meta property="og:title" content="Maliki Atelier — Coming Soon" />
<meta property="og:description" content="A new standard of craftsmanship is arriving. By invitation only." />
<meta property="og:url" content="https://www.malikiatelier.com/" />
<meta property="og:image" content="https://www.malikiatelier.com/og.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Maliki Atelier — Coming Soon" />
<meta name="twitter:description" content="A new standard of craftsmanship is arriving. By invitation only." />
<meta name="twitter:image" content="https://www.malikiatelier.com/og.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Italiana&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  :root {
    --black: #0a0908;
    --charcoal: #141311;
    --graphite: #1d1b18;
    --ink: #07060a;
    --gold-1: #e8c488;
    --gold-2: #b68a4e;
    --gold-3: #8a6531;
    --gold-highlight: #f8e3b4;
    --soft: rgba(245, 236, 218, 0.92);
    --softer: rgba(245, 236, 218, 0.70);
    --text-shadow: 0 1px 2px rgba(0,0,0,0.85), 0 0 14px rgba(0,0,0,0.55);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--black);
    color: var(--soft);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Cinematic video background ---------- */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }

  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 1.8s ease-in-out;
    /* Subtle warm desaturation to keep it in the luxury palette */
    filter: saturate(0.9) contrast(1.02) brightness(1.1);
    will-change: opacity;
  }
  .stage video.active {
    opacity: 1;
  }

  /* Warm directional light wash over footage */
  .stage::before {
    content: "";
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(ellipse 70% 60% at 22% 18%, rgba(255, 220, 170, 0.14) 0%, rgba(255, 220, 170, 0.05) 35%, transparent 70%),
      radial-gradient(ellipse 60% 55% at 78% 85%, rgba(0, 0, 0, 0.45) 0%, transparent 70%);
    pointer-events: none;
    mix-blend-mode: soft-light;
    z-index: 1;
  }

  /* Light tint so the footage sits under the type without dimming it */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.12) 70%, rgba(0,0,0,0.28) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Fine film grain for tactile feel */
  .weave {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.06  0 0 0 0.4 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size: 280px 280px;
    opacity: 0.25;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 2;
  }

  /* Vignette for cinematic depth */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 90%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ---------- Composition ---------- */
  .wrap {
    position: relative;
    z-index: 2;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: clamp(28px, 5vh, 56px) clamp(24px, 5vw, 64px);
  }

  .top-bar,
  .bottom-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--soft);
    text-shadow: var(--text-shadow);
  }

  .top-bar .mark,
  .bottom-bar span {
    color: var(--softer);
  }

  .divider {
    display: inline-block;
    width: 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--softer), transparent);
    margin: 0 10px;
    vertical-align: middle;
  }

  /* ---------- Centerpiece ---------- */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(22px, 3.5vh, 40px);
    width: 100%;
    max-width: 900px;
  }

  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.62em;
    text-transform: uppercase;
    color: var(--soft);
    text-shadow: var(--text-shadow);
    padding-bottom: 4px;
    position: relative;
  }
  .eyebrow::before,
  .eyebrow::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--softer), transparent);
  }
  .eyebrow::before { left: -56px; }
  .eyebrow::after { right: -56px; }

  /* ---------- Engraved logo ---------- */
  .logo {
    text-align: center;
    user-select: none;
    padding: 6px 0 14px;
  }

  /*
    Engraved script effect:
    - Base color matches background so lettering reads as a recess
    - Inner dark shadows sink the glyph into the fabric
    - Bright upper-edge highlight = light catching the bevel
    - Lower/right soft highlight = subsurface scatter on fabric
  */
  .logo .maliki {
    display: block;
    font-family: 'Pinyon Script', 'Cormorant Garamond', serif;
    font-size: clamp(88px, 17vw, 220px);
    line-height: 0.95;
    font-weight: 400;

    /* Gold inlay sweep */
    background:
      linear-gradient(
        160deg,
        #6a4e25 0%,
        #8a6531 10%,
        #c99a5a 26%,
        #f3dba6 42%,
        #d9b070 55%,
        #a77b41 72%,
        #7a5727 88%,
        #4a351a 100%
      );
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;

    /* Multiple shadows: deep recess + bevel highlight */
    filter:
      drop-shadow(0 1px 0 rgba(255, 225, 180, 0.06))
      drop-shadow(0 -1px 0 rgba(0, 0, 0, 0.9))
      drop-shadow(2px 3px 5px rgba(0, 0, 0, 0.75));

    text-shadow:
      /* Inner dark recess (groove depth) */
      0 1px 0 rgba(0, 0, 0, 0.85),
      0 2px 2px rgba(0, 0, 0, 0.7),
      /* Upper rim highlight — light from upper-left */
      -1px -1px 0 rgba(0, 0, 0, 0.9);

    letter-spacing: 0.005em;
    transform: translateZ(0);
  }

  /* Debossed ATELIER — recessed into fabric, no gold inlay */
  .logo .atelier {
    display: block;
    margin-top: clamp(10px, 1.6vh, 22px);
    font-family: 'Italiana', 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(16px, 2.4vw, 28px);
    letter-spacing: 0.85em;
    text-indent: 0.85em; /* compensate trailing letter-spacing */
    text-transform: uppercase;

    /* Color slightly darker than background = carved in */
    color: #0b0a08;

    text-shadow:
      /* Deep inner shadow (bottom of groove) */
      0 1px 0 rgba(0, 0, 0, 0.95),
      0 2px 1px rgba(0, 0, 0, 0.8),
      /* Upper-left rim catches light */
      -1px -1px 0 rgba(60, 48, 30, 0.55),
      -0.5px -0.5px 0 rgba(120, 95, 55, 0.35),
      /* Lower-right inner bevel */
      0.5px 1px 0 rgba(0, 0, 0, 0.9);
  }

  /* Decorative flourish under logo */
  .flourish {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0.7;
  }
  .flourish .line {
    width: clamp(40px, 8vw, 96px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(217, 176, 112, 0.55), transparent);
  }
  .flourish .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #f3dba6, #8a6531 70%, #3a2a14 100%);
    box-shadow: 0 0 6px rgba(217, 176, 112, 0.35), inset 0 -1px 0 rgba(0,0,0,0.5);
  }

  /* ---------- Copy ---------- */
  .coming-soon {
    font-family: 'Italiana', serif;
    font-size: clamp(12px, 1.3vw, 14px);
    letter-spacing: 0.72em;
    text-indent: 0.72em;
    text-transform: uppercase;
    color: #f3d89e;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 18px rgba(0,0,0,0.55);
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(14px, 1.35vw, 17px);
    letter-spacing: 0.18em;
    color: #f5ecda;
    text-align: center;
    max-width: 540px;
    line-height: 1.55;
    text-shadow: var(--text-shadow);
  }

  /* ---------- Email form ---------- */
  .notify {
    margin-top: clamp(6px, 1.5vh, 14px);
    width: min(460px, 90vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .field {
    width: 100%;
    position: relative;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(217, 176, 112, 0.28);
    transition: border-color 0.6s ease;
  }
  .field:focus-within {
    border-color: rgba(217, 176, 112, 0.7);
  }
  .field::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -1px;
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-1), transparent);
    transition: width 0.7s cubic-bezier(.2,.7,.2,1), left 0.7s cubic-bezier(.2,.7,.2,1);
  }
  .field:focus-within::after {
    left: 0;
    width: 100%;
  }

  .field input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    padding: 14px 2px;
    color: #f5ecda;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    text-shadow: var(--text-shadow);
  }
  .field input::placeholder {
    color: rgba(245, 236, 218, 0.70);
    letter-spacing: 0.32em;
    font-style: italic;
    text-transform: uppercase;
  }

  .field button {
    background: transparent;
    border: 0;
    color: #f3d89e;
    font-family: 'Italiana', serif;
    font-size: 12px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    padding: 12px 6px 12px 18px;
    cursor: pointer;
    transition: color 0.4s ease, letter-spacing 0.4s ease;
    text-shadow: var(--text-shadow);
  }
  .field button:hover {
    color: var(--gold-highlight);
    letter-spacing: 0.5em;
  }

  .consent {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--soft);
    text-align: center;
    text-shadow: var(--text-shadow);
  }

  .thanks {
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    font-family: 'Italiana', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(217, 176, 112, 0.9);
    text-align: center;
    min-height: 14px;
  }
  .thanks.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .thanks.error {
    color: #d99a6c;
  }

  .notify.success .field,
  .notify.success .consent {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  /* ---------- Entry animation ---------- */
  .reveal { opacity: 0; transform: translateY(10px); animation: rise 1.6s cubic-bezier(.2,.7,.2,1) forwards; }
  .r1 { animation-delay: 0.1s; }
  .r2 { animation-delay: 0.45s; }
  .r3 { animation-delay: 0.9s; }
  .r4 { animation-delay: 1.25s; }
  .r5 { animation-delay: 1.55s; }
  .r6 { animation-delay: 1.8s; }
  .r7 { animation-delay: 2.05s; }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Gentle gold shimmer drift on the script */
  .logo .maliki {
    background-size: 200% 200%;
    background-position: 20% 30%;
    animation: shimmer 14s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 20% 30%; }
    50%  { background-position: 80% 70%; }
    100% { background-position: 20% 30%; }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 520px) {
    .eyebrow::before,
    .eyebrow::after { display: none; }
    .top-bar, .bottom-bar {
      font-size: 9px;
      letter-spacing: 0.3em;
    }
    .top-bar .right, .bottom-bar .right { display: none; }
    .logo .atelier { letter-spacing: 0.55em; text-indent: 0.55em; }
    .coming-soon { letter-spacing: 0.5em; text-indent: 0.5em; }
    .tagline { font-size: 13px; letter-spacing: 0.14em; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; animation: none; }
    .logo .maliki { animation: none; }
  }
</style>
</head>
<body>
  <div class="stage" aria-hidden="true">
    <video id="bg1" class="bg-video active" src="bg-1.mp4" muted playsinline preload="auto" autoplay></video>
    <video id="bg2" class="bg-video"        src="bg-2.mp4" muted playsinline preload="metadata"></video>
    <div class="weave"></div>
    <div class="vignette"></div>
  </div>

  <main class="wrap">
    <header class="top-bar reveal r1"></header>

    <section class="center">
      <h1 class="logo">
        <span class="maliki reveal r3">Maliki</span>
      </h1>

      <div class="flourish reveal r5" aria-hidden="true">
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line"></span>
      </div>

      <p class="tagline reveal r6">
        A new standard of craftsmanship is arriving.
      </p>

      <form class="notify reveal r7" id="notifyForm" novalidate>
        <label class="field" for="email">
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="Your Email Address"
            required
          />
          <button type="submit" aria-label="Request access">Request Access</button>
        </label>
        <div class="consent">Private List · No Announcements, Only Invitations</div>
        <div class="thanks" id="thanks" role="status" aria-live="polite"></div>
      </form>
    </section>

    <footer class="bottom-bar reveal r7">
      <span class="left"></span>
      <span>© Maliki Atelier</span>
      <span class="right">By Appointment</span>
    </footer>
  </main>

  <script>
    // Cross-fade between the two background clips
    (function () {
      const v1 = document.getElementById('bg1');
      const v2 = document.getElementById('bg2');
      const clips = [v1, v2];
      let i = 0;

      const start = (v) => {
        const p = v.play();
        if (p && typeof p.catch === 'function') p.catch(() => {});
      };

      // Begin playback; some browsers require a nudge after autoplay attribute
      start(v1);

      const swap = () => {
        const current = clips[i];
        const next = clips[(i + 1) % clips.length];
        try { next.currentTime = 0; } catch (e) {}
        start(next);
        next.classList.add('active');
        current.classList.remove('active');
        i = (i + 1) % clips.length;
      };

      // When a clip ends, hand off to the other
      v1.addEventListener('ended', swap);
      v2.addEventListener('ended', swap);

      // Defer bg-2 download until bg-1 is buffered, to keep first-paint light
      v1.addEventListener('loadeddata', () => { v2.preload = 'auto'; v2.load(); }, { once: true });
    })();

    const EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const ORIGINAL_LABEL = 'Request Access';

    const form = document.getElementById('notifyForm');
    const thanks = document.getElementById('thanks');
    const input = document.getElementById('email');
    const submitBtn = form.querySelector('button[type="submit"]');

    const setSubmitting = (busy) => {
      submitBtn.disabled = busy;
      submitBtn.textContent = busy ? 'Sending' : ORIGINAL_LABEL;
      if (busy) submitBtn.setAttribute('aria-busy', 'true');
      else submitBtn.removeAttribute('aria-busy');
    };

    const showError = (msg) => {
      thanks.textContent = msg;
      thanks.classList.add('visible', 'error');
      input.focus();
    };

    const showSuccess = () => {
      thanks.classList.remove('error');
      thanks.textContent = 'Thank you — your invitation will follow.';
      thanks.classList.add('visible');
      form.classList.add('success');
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const value = input.value.trim();
      if (!EMAIL_RX.test(value)) {
        showError('Please enter a valid email address.');
        return;
      }

      setSubmitting(true);

      try {
        const res = await fetch('/api/notify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: value }),
        });
        if (!res.ok) throw new Error('signup_failed');
        showSuccess();
      } catch (err) {
        setSubmitting(false);
        showError('Something went wrong. Please try again.');
      }
    });
  </script>
</body>
</html>
