<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title id="pageTitle">Maliki Atelier</title>
<meta name="description" content="" />
<link rel="canonical" href="" />
<meta name="theme-color" content="#0a0908" />

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>

<style>
  :root {
    --bg: #0a0908;
    --charcoal: #141311;
    --soft: rgba(245, 236, 218, 0.98);
    --softer: rgba(245, 236, 218, 0.86);
    --softest: rgba(245, 236, 218, 0.62);
    --gold-1: #e8c488;
    --gold-2: #b68a4e;
    --gold-hi: #f8e3b4;
    --line: rgba(217, 176, 112, 0.28);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--soft);
    font-family: 'Lora', serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(16px, 3vh, 28px) clamp(20px, 5vw, 56px);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0;
    background: rgba(10, 9, 8, 0.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
  }
  .wordmark { display: inline-flex; align-items: center; line-height: 0; }
  .wordmark img { height: clamp(52px, 5.5vw, 80px); width: auto; display: block; }
  .nav {
    display: flex; gap: clamp(18px, 2.8vw, 36px); align-items: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #f5ecda;
  }
  .nav a:hover { color: var(--gold-hi); }
  .burger {
    display: none; flex-direction: column; justify-content: space-between;
    width: 24px; height: 18px; background: transparent; border: none;
    cursor: pointer; padding: 0;
  }
  .burger span { display: block; height: 1.5px; width: 100%; background: var(--soft); }
  .mobile-nav {
    display: none; position: fixed; inset: 0; z-index: 99;
    background: rgba(10, 9, 8, 0.98);
    flex-direction: column; justify-content: center; align-items: center; gap: 36px;
    font-family: 'Playfair Display', serif;
    font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; color: #f5ecda;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a { transition: color 0.2s; }
  .mobile-nav a:hover { color: var(--gold-hi); }
  .mobile-nav-close {
    position: absolute; top: clamp(16px, 3vh, 28px); right: clamp(20px, 5vw, 56px);
    background: transparent; border: none; color: var(--softer);
    font-size: 20px; cursor: pointer; padding: 8px; line-height: 1;
  }
  .mobile-nav-close:hover { color: var(--gold-hi); }
  @media (max-width: 768px) { .nav { display: none; } .burger { display: flex; } }
  .cart-btn {
    background: transparent; border: 1px solid var(--line); color: var(--soft);
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    padding: 9px 16px; border-radius: 4px;
    transition: color 0.3s ease, border-color 0.3s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .cart-btn:hover { color: var(--gold-hi); border-color: rgba(217, 176, 112, 0.5); }
  .cart-btn .count {
    display: inline-block; background: var(--gold-1); color: #1a120a;
    border-radius: 100px; padding: 1px 7px; font-size: 10px; font-weight: 600; letter-spacing: 0;
  }

  .hero {
    text-align: center;
    padding: clamp(56px, 10vh, 110px) 24px clamp(40px, 7vh, 80px);
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-family: 'Playfair Display', serif;
    font-size: 12px; letter-spacing: 0.5em; text-indent: 0.5em;
    text-transform: uppercase; color: var(--gold-1);
    display: block; padding-bottom: 16px;
  }
  .h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(36px, 5vw, 64px);
    color: #f5ecda; font-weight: 400;
  }

  .prose-section {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(48px, 8vh, 96px) clamp(20px, 5vw, 56px);
  }
  .prose p {
    color: var(--softer);
    font-size: clamp(15px, 1.2vw, 17px);
    line-height: 1.82;
    letter-spacing: 0.025em;
    margin-bottom: 20px;
  }
  .prose p:last-child { margin-bottom: 0; }

  .state {
    text-align: center;
    padding: clamp(64px, 12vh, 120px) 24px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--softest);
    font-size: 18px;
    letter-spacing: 0.05em;
  }

  .footer {
    border-top: 1px solid var(--line);
    padding: clamp(18px, 4vh, 32px) clamp(20px, 5vw, 56px);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--softer);
  }
</style>
</head>
<body>

  <header class="topbar">
    <a href="/" class="wordmark" aria-label="Maliki Atelier home">
      <img src="/assets/maliki-logo.svg" alt="Maliki Atelier">
    </a>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/shop">Shop</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/account">Account</a>
      <a class="cart-btn" href="/cart">Cart <span class="count" id="cartCount">0</span></a>
    </nav>
    <button class="burger" id="burgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-nav" id="mobileNav" role="dialog" aria-label="Navigation" aria-hidden="true">
    <button class="mobile-nav-close" id="mobileNavClose" aria-label="Close menu">✕</button>
    <a href="/">Home</a>
    <a href="/shop">Shop</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/account">Account</a>
    <a href="/cart">Cart</a>
  </div>

  <section class="hero" id="pageHero" style="display:none">
    <span class="eyebrow" id="heroEyebrow"></span>
    <h1 class="h1" id="heroTitle"></h1>
  </section>

  <main>
    <div id="loadingState" class="state">Loading…</div>
    <div id="notFoundState" class="state" style="display:none">Page not found.</div>
    <div id="proseSection" class="prose-section" style="display:none">
      <div class="prose" id="proseBody"></div>
    </div>
  </main>

  <footer class="footer">
    <span>© Maliki Atelier</span>
    <span>White-Glove Courier · Insured Worldwide</span>
  </footer>

  <script src="/assets/ring-svg.js"></script>
  <script src="/assets/mock-data.js"></script>
  <script src="/assets/store.js"></script>
  <script src="/assets/supabase-sync.js"></script>
  <script>
    const updateCartCount = () => {
      document.getElementById('cartCount').textContent = Store.cartCount();
    };
    Store.on(updateCartCount);
    updateCartCount();

    (async () => {
      const slug = new URLSearchParams(location.search).get('slug') || '';
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      const show = (id) => document.getElementById(id).style.display = '';
      const hide = (id) => document.getElementById(id).style.display = 'none';

      try {
        const res = await fetch('/api/pages');
        if (!res.ok) throw new Error('api_error');
        const { pages } = await res.json();
        const page = pages[slug];

        hide('loadingState');

        if (!page) {
          show('notFoundState');
          return;
        }

        document.getElementById('pageTitle').textContent = `${page.title} — Maliki Atelier`;

        // Update meta/canonical for SEO
        const canonical = document.querySelector('link[rel="canonical"]') || (() => {
          const l = document.createElement('link'); l.rel = 'canonical'; document.head.appendChild(l); return l;
        })();
        canonical.href = `https://www.malikiatelier.com/page/?slug=${encodeURIComponent(slug)}`;

        const metaDesc = document.querySelector('meta[name="description"]') || (() => {
          const m = document.createElement('meta'); m.name = 'description'; document.head.appendChild(m); return m;
        })();
        metaDesc.content = page.body ? page.body.slice(0, 160).replace(/\n/g,' ') : page.title;

        document.getElementById('heroEyebrow').textContent = page.title;
        document.getElementById('heroTitle').textContent = page.title;
        show('pageHero');

        const paras = page.body.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
        document.getElementById('proseBody').innerHTML = paras.map(p => `<p>${esc(p)}</p>`).join('');
        show('proseSection');
      } catch {
        hide('loadingState');
        show('notFoundState');
      }
    })();
  </script>
  <script>(function(){try{var k='maliki.vid',s='maliki.sid',v=localStorage.getItem(k);if(!v){v=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem(k,v);}var sid=sessionStorage.getItem(s);if(!sid){sid=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem(s,sid);}var u=new URLSearchParams(location.search);var d={path:location.pathname,referrer:document.referrer,visitor_id:v,session_id:sid,screen:innerWidth+'x'+innerHeight,utm_source:u.get('utm_source')||'',utm_medium:u.get('utm_medium')||'',utm_campaign:u.get('utm_campaign')||''};if(localStorage.getItem('maliki.cookies')==='accepted'){fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),keepalive:true});}}catch(e){}})();</script>
<script>
  (function(){
    var burger = document.getElementById('burgerBtn');
    var nav = document.getElementById('mobileNav');
    var closeBtn = document.getElementById('mobileNavClose');
    if (!burger || !nav) return;
    function openNav() { nav.classList.add('open'); burger.setAttribute('aria-expanded','true'); nav.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
    function closeNav() { nav.classList.remove('open'); burger.setAttribute('aria-expanded','false'); nav.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
    burger.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    nav.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeNav); });
  })();
</script>
<script src="/assets/animations.js" defer></script>
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(20,19,17,0.97);border-top:1px solid rgba(217,176,112,0.28);padding:16px clamp(20px,5vw,56px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:Lora,serif;font-size:13px;color:rgba(245,236,218,0.86)"><span>We use cookies to improve your experience. <a href="/page/?slug=privacy" style="color:#d9b070;text-underline-offset:3px;text-decoration:underline">Privacy policy</a></span><div style="display:flex;gap:10px;flex-shrink:0"><button onclick="setCookies(true)" style="background:linear-gradient(180deg,#d9b070,#b68a4e);border:0;color:#1a120a;font-family:Playfair Display,serif;font-size:10px;letter-spacing:0.38em;text-transform:uppercase;padding:9px 18px;cursor:pointer">Accept</button><button onclick="setCookies(false)" style="background:transparent;border:1px solid rgba(217,176,112,0.3);color:rgba(245,236,218,0.62);font-family:Playfair Display,serif;font-size:10px;letter-spacing:0.38em;text-transform:uppercase;padding:9px 18px;cursor:pointer">Decline</button></div></div><script>(function(){var b=document.getElementById("cookie-banner");if(!localStorage.getItem("maliki.cookies")&&b){b.style.display="flex";}window.setCookies=function(v){localStorage.setItem("maliki.cookies",v?"accepted":"declined");if(b)b.style.display="none";}})()</script>
</body>
</html>
